function getIrisu(key,sub){
  var o=IRISU[key];if(!o)return 1;
  if(typeof o==='number')return o;
  if(sub!==undefined&&o[sub])return o[sub];
  return o.sml||o.S||1;
}
function getBoxWt(key,sub){
  var o=BOX_WEIGHT[key];if(!o)return 5;
  if(typeof o==='number')return o;
  if(sub!==undefined&&o[sub])return o[sub];
  return o.sml||o.S||5;
}

function calcShipping(lines,whId,custPref){
  var whReg=WH_MAP[whId].region;
  var custReg=REGION_KEY_MAP[getRegion(custPref)]||'kanto';
  var rate=SR[whReg]&&SR[whReg][custReg]||45;
  /* Build combined BOM for all lines */
  var allBom=[];
  lines.forEach(function(l){
    if(l.isFreeInput)return;/* Free input lines have no BOM for shipping calc */
    var bom;
    if(l.isPartOnly){bom=[];if(l.isDoor){bom.push({key:l.partKey,qty:l.qty,label:l.partLabel,isDoor:true,doorSub:l.partSub});}else if(l.partSub!==undefined){bom.push({key:l.partKey,sub:l.partSub,qty:l.qty,label:l.partLabel});}else{bom.push({key:l.partKey,qty:l.qty,label:l.partLabel});}}
    else{bom=calcBOM(l.size,l.islands,l.tiers,l.lock,l.type,l);}
    allBom=allBom.concat(bom);
  });
  /* Calculate total weight from boxes */
  var tw=0,totalBoxes=0;
  allBom.forEach(function(b){
    var iri,bw;
    if(b.isDoor){
      iri=getIrisu(b.key,b.doorSub||b.sub);bw=getBoxWt(b.key,b.doorSub||b.sub);
    }else if(b.sub!==undefined){
      iri=getIrisu(b.key,b.sub);bw=getBoxWt(b.key,b.sub);
    }else{
      iri=getIrisu(b.key);bw=getBoxWt(b.key);
    }
    var boxes=Math.ceil(b.qty/iri);
    tw+=boxes*bw;totalBoxes+=boxes;
  });
  /* Base board weight is already in BOM via calcBOM when hasBase!==false, so skip separate calculation */
  var base=tw*rate+MISC_FEE;
  var ship=Math.ceil(base*MARKUP);
  if(tw>CHARTER_KG)ship+=CHARTER_FEE;
  return{weight:Math.round(tw*10)/10,rate:rate,shipping:ship,charter:tw>CHARTER_KG,boxes:totalBoxes};
}

/* ========== BOM CALCULATION ========== */
function sizeObj(v){return SIZES.find(function(s){return s.v===v;})||SIZES[0];}
function calcBOM(size,islands,tiers,lock,type,opts){
  opts=opts||{};
  var n=islands*tiers,so=sizeObj(size),grp=so.grp,bom=[];
  var isOpen=type==='open',isPersonal=type==='personal';
  /* Boards always included */
  bom.push({key:'top',sub:grp,qty:n,label:'トップボード('+grp.toUpperCase()+')',reason:n+'台×1'});
  if(so.dbl){
    bom.push({key:'side',sub:'SS',qty:n*4,label:'サイドボード(SS)',reason:n+'台×4'});
    bom.push({key:'back',sub:'SS',qty:n*2,label:'バックボード(SS)',reason:n+'台×2'});
  }else{
    bom.push({key:'side',sub:size,qty:n*2,label:'サイドボード('+size+')',reason:n+'台×2'});
    bom.push({key:'back',sub:size,qty:n*1,label:'バックボード('+size+')',reason:n+'台×1'});
  }
  /* Door: not for open type. doorType from opts overrides default logic */
  if(!isOpen){
    var dk=opts.doorType==='doorH'?'doorH':(isPersonal?'doorH':'door');
    bom.push({key:dk,qty:n,label:(dk==='doorH'?'扉〈ホタ〉':'扉')+'('+size+')',reason:n+'台×1',isDoor:true,doorSub:size});
  }
  /* Base - optional */
  if(opts.hasBase!==false){
    bom.push({key:'base',sub:grp,qty:islands,label:'ベースボード('+grp.toUpperCase()+')',reason:islands+'島×1'});
  }
  /* Shelf - optional */
  var shelfQty=parseInt(opts.shelfQty)||0;
  if(shelfQty>0){
    bom.push({key:'shelf',sub:grp,qty:shelfQty,label:'棚板('+grp.toUpperCase()+')',reason:shelfQty+'枚'});
  }
  /* Vertical joints */
  if(tiers>1){
    var vc=islands*(tiers-1);
    bom.push({key:'vj',sub:grp,qty:vc*3,label:'上下ジョイント('+grp.toUpperCase()+')',reason:vc+'接続×3'});
  }
  /* Side joints */
  if(islands>1){
    var sc=(islands-1)*tiers;
    bom.push({key:'sj',sub:grp,qty:sc*2,label:'サイドジョイント('+grp.toUpperCase()+')',reason:sc+'接続×2'});
  }
  /* Handle: personal only, S/M/L only */
  if(isPersonal&&['S','M','L'].indexOf(size)>=0){
    bom.push({key:'handle',qty:n,label:'ハンドル(トッテ)',reason:n+'台×1'});
  }
  /* Lock: standard=optional, personal=required, open=none */
  if(!isOpen&&lock&&lock!=='none'){
    bom.push({key:lock,qty:n,label:LOCK_TYPES.find(function(lt){return lt.v===lock;})?LOCK_TYPES.find(function(lt){return lt.v===lock;}).l:'錠前',reason:n+'台×1'});
  }
  return bom;
}

  var orderCol=isOrderColor(line,color);
  bom.forEach(function(b){
    var stock,held,free;
    if(b.isDoor){
      if(orderCol){
        items.push({label:b.label,need:b.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var dk=b.key;/* 'door' or 'doorH' */
      stock=gd(line,wh,color,size,dk);held=ghd(line,wh,color,size,dk);free=stock-held;
    }else if(b.sub!==undefined){
      stock=gs(line,wh,b.key,b.sub);held=gh(line,wh,b.key,b.sub);free=stock-held;
    }else{
      stock=gs(line,wh,b.key);held=gh(line,wh,b.key);free=stock-held;
    }
    var pass=free>=b.qty;
    if(!pass)ok=false;
    items.push({label:b.label,need:b.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,b.qty-free)});
  });
  return{ok:ok,items:items};
}

function holdBOM(line,wh,bom,color,size,colorBreakdown){
  bom.forEach(function(b){
    if(b.isDoor){
      var doorColors=colorBreakdown&&colorBreakdown.length>0?colorBreakdown:[{color:color,qty:b.qty}];
      doorColors.forEach(function(dc){
        if(isOrderColor(line,dc.color))return;
        var dk=b.key;
        if(!HELD[line][wh][dk])HELD[line][wh][dk]={};
        if(!HELD[line][wh][dk][dc.color])HELD[line][wh][dk][dc.color]={};
        HELD[line][wh][dk][dc.color][size]=(HELD[line][wh][dk][dc.color][size]||0)+dc.qty;
      });
    }else if(b.sub!==undefined){
      if(!HELD[line][wh][b.key])HELD[line][wh][b.key]={};
      HELD[line][wh][b.key][b.sub]=(HELD[line][wh][b.key][b.sub]||0)+b.qty;
    }else{
      HELD[line][wh][b.key]=(HELD[line][wh][b.key]||0)+b.qty;
    }
  });
}

function releaseBOM(line,wh,bom,color,size,colorBreakdown){
  bom.forEach(function(b){
    if(b.isDoor){
      var doorColors=colorBreakdown&&colorBreakdown.length>0?colorBreakdown:[{color:color,qty:b.qty}];
      doorColors.forEach(function(dc){
        if(isOrderColor(line,dc.color))return;
        var dk=b.key;
        if(HELD[line][wh][dk]&&HELD[line][wh][dk][dc.color]){
          HELD[line][wh][dk][dc.color][size]=Math.max(0,(HELD[line][wh][dk][dc.color][size]||0)-dc.qty);
        }
      });
    }else if(b.sub!==undefined){
      if(HELD[line][wh][b.key]){
        HELD[line][wh][b.key][b.sub]=Math.max(0,(HELD[line][wh][b.key][b.sub]||0)-b.qty);
      }
    }else{
      HELD[line][wh][b.key]=Math.max(0,(HELD[line][wh][b.key]||0)-b.qty);
    }
  });
}

function holdBOMMulti(line,whA,whB,bom,color,size,colorBreakdown){
  bom.forEach(function(b){
    if(b.isDoor){
      var doorColors=colorBreakdown&&colorBreakdown.length>0?colorBreakdown:[{color:color,qty:b.qty}];
      doorColors.forEach(function(dc){
        if(isOrderColor(line,dc.color))return;
        var dk=b.key;
        var freeA=availD(line,whA,dc.color,size,dk);
        var takeA=Math.min(freeA,dc.qty),takeB=dc.qty-takeA;
        if(takeA>0){
          if(!HELD[line][whA][dk])HELD[line][whA][dk]={};
          if(!HELD[line][whA][dk][dc.color])HELD[line][whA][dk][dc.color]={};
          HELD[line][whA][dk][dc.color][size]=(HELD[line][whA][dk][dc.color][size]||0)+takeA;
        }
        if(takeB>0){
          if(!HELD[line][whB][dk])HELD[line][whB][dk]={};
          if(!HELD[line][whB][dk][dc.color])HELD[line][whB][dk][dc.color]={};
          HELD[line][whB][dk][dc.color][size]=(HELD[line][whB][dk][dc.color][size]||0)+takeB;
        }
      });
    }else if(b.sub!==undefined){
      var fA=avail(line,whA,b.key,b.sub);
      var tA=Math.min(fA,b.qty),tB=b.qty-tA;
      if(tA>0){if(!HELD[line][whA][b.key])HELD[line][whA][b.key]={};HELD[line][whA][b.key][b.sub]=(HELD[line][whA][b.key][b.sub]||0)+tA;}
      if(tB>0){if(!HELD[line][whB][b.key])HELD[line][whB][b.key]={};HELD[line][whB][b.key][b.sub]=(HELD[line][whB][b.key][b.sub]||0)+tB;}
    }else{
      var fA2=avail(line,whA,b.key);
      var tA2=Math.min(fA2,b.qty),tB2=b.qty-tA2;
      if(tA2>0)HELD[line][whA][b.key]=(HELD[line][whA][b.key]||0)+tA2;
      if(tB2>0)HELD[line][whB][b.key]=(HELD[line][whB][b.key]||0)+tB2;
    }
  });
}

        doorColors2.forEach(function(dc){

        var tA2=Math.min(sA2,b.qty),tB2=b.qty-tA2;
        if(tA2>0)STK[ln.line][whA][b.key][b.sub]=Math.max(0,sA2-tA2);
        if(tB2>0&&STK[ln.line]&&STK[ln.line][whB]&&STK[ln.line][whB][b.key]){
          STK[ln.line][whB][b.key][b.sub]=Math.max(0,(STK[ln.line][whB][b.key][b.sub]||0)-tB2);
        }
      }else{
        var sA3=(STK[ln.line]&&STK[ln.line][whA]&&STK[ln.line][whA][b.key])||0;
        var tA3=Math.min(sA3,b.qty),tB3=b.qty-tA3;
        if(tA3>0)STK[ln.line][whA][b.key]=Math.max(0,sA3-tA3);
        if(tB3>0&&STK[ln.line]&&STK[ln.line][whB]){
          STK[ln.line][whB][b.key]=Math.max(0,(STK[ln.line][whB][b.key]||0)-tB3);
        }
      }
    });
    /* Release HELD from both warehouses */
    releaseBOM(ln.line,whA,bom,ln.color,ln.size,ln.colorBreakdown);
    releaseBOM(ln.line,whB,bom,ln.color,ln.size,ln.colorBreakdown);
  });

/* ========== CHECK ALL LINES AT WAREHOUSE ========== */
function checkAllLinesWH(lines,wh){
  var allOk=true,allItems=[];
  /* Group lines by product line (jp01, jp2, tw, sa) since they use separate inventory pools */
  var byLine={};
  lines.forEach(function(ln){
    if(!byLine[ln.line])byLine[ln.line]=[];
    byLine[ln.line].push(ln);
  });
  Object.keys(byLine).forEach(function(lineId){
    var group=byLine[lineId];
    /* Check if this product line exists at the warehouse */
    if(!hasStock(lineId,wh)){
      allOk=false;
      allItems.push({label:'製品ライン「'+(LINES.find(function(l){return l.id===lineId;})||{}).name+'」取扱なし',need:0,stock:0,held:0,free:0,ok:false,shortage:0});
      return;
    }
    /* Aggregate BOM quantities across all order lines in this product line group */
    var structAgg={};/* key: "key|sub" -> {qty, label, key, sub} */
    var doorAgg={};/* key: "doorKey|color|size" -> {qty, label, doorKey, color, size} */
    var simpleAgg={};/* key: "key" -> {qty, label, key} */
    group.forEach(function(ln){
      if(ln.isFreeInput)return;/* Free input lines have no inventory to check */
      var bom;
      if(ln.isPartOnly){
        bom=[];
        if(ln.isDoor){bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}
        else if(ln.partSub!==undefined){bom.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
        else{bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
      }else{bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
      var orderCol=isOrderColor(lineId,ln.color);
      var colorName_=(LINE_COLORS[lineId]||[]).find(function(cc){return cc.v===ln.color;});
      var cLabel=colorName_?(' '+colorName_.l):'';
      bom.forEach(function(b){
        if(b.isDoor){
          /* E7: multi-color support */
          var doorColors=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
          doorColors.forEach(function(dc){
            var oc2=isOrderColor(lineId,dc.color);
            var cn2=(LINE_COLORS[lineId]||[]).find(function(cc){return cc.v===dc.color;});
            var cl2=cn2?(' '+cn2.l):'';
            if(oc2){
              var oKey='order|'+b.key+'|'+dc.color+'|'+ln.size;
              if(!doorAgg[oKey])doorAgg[oKey]={qty:0,label:b.label+cl2,doorKey:b.key,color:dc.color,size:ln.size,isOrder:true};
              doorAgg[oKey].qty+=dc.qty;
            }else{
              var dKey=b.key+'|'+dc.color+'|'+ln.size;
              if(!doorAgg[dKey])doorAgg[dKey]={qty:0,label:b.label+cl2,doorKey:b.key,color:dc.color,size:ln.size,isOrder:false};
              doorAgg[dKey].qty+=dc.qty;
            }
          });
        }else if(b.sub!==undefined){
          var sKey=b.key+'|'+b.sub;
          if(!structAgg[sKey])structAgg[sKey]={qty:0,label:b.label,key:b.key,sub:b.sub};
          structAgg[sKey].qty+=b.qty;
        }else{
          if(!simpleAgg[b.key])simpleAgg[b.key]={qty:0,label:b.label,key:b.key};
          simpleAgg[b.key].qty+=b.qty;
        }
      });
    });
    /* Check aggregated structural parts */
    Object.keys(structAgg).forEach(function(k){
      var a=structAgg[k];
      var stock=gs(lineId,wh,a.key,a.sub);
      var held=gh(lineId,wh,a.key,a.sub);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated doors */
    Object.keys(doorAgg).forEach(function(k){
      var a=doorAgg[k];
      if(a.isOrder){
        allItems.push({label:a.label,need:a.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var stock=gd(lineId,wh,a.color,a.size,a.doorKey);
      var held=ghd(lineId,wh,a.color,a.size,a.doorKey);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated simple parts */
    Object.keys(simpleAgg).forEach(function(k){
      var a=simpleAgg[k];
      var stock=gs(lineId,wh,a.key);
      var held=gh(lineId,wh,a.key);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
  });
  return{ok:allOk,items:allItems};
}

/* ========== EXCEL GENERATION (SheetJS) ========== */
function generateExcel(order,docType){
  if(typeof XLSX==='undefined'){alert('SheetJS未読込');return;}
  docType=docType||'quote';
  var cust=CUSTS.find(function(c){return c.id===order.cid;});
  var DOC_CFG={
    quote:{title:'御見積書',amountLabel:'見積金額（税込）',slipPrefix:'見積',dateLabel:'見積日',sheet:'見積書'},
    invoice:{title:'請求書',amountLabel:'請求金額（税込）',slipPrefix:'請求',dateLabel:'請求日',sheet:'請求書'},
    delivery:{title:'納品書',amountLabel:'納品金額（税込）',slipPrefix:'納品',dateLabel:'納品日',sheet:'納品書'},
    receipt:{title:'物品受領書',amountLabel:'',slipPrefix:'納品',dateLabel:'納品日',sheet:'物品受領書'},
    shipping:{title:'出荷指示書',amountLabel:'',slipPrefix:'出荷',dateLabel:'出荷指示日',sheet:'出荷指示書'}
  };
  var cfg=DOC_CFG[docType]||DOC_CFG.quote;
  var isReceipt=docType==='receipt'||docType==='shipping';
  var q=generateQuoteHTML(order,docType);
  var wb=XLSX.utils.book_new();
  var wsData=[];
  wsData.push([cfg.title]);
  wsData.push([]);
  wsData.push(['顧客名',cust?cust.name+' 御中':'','','株式会社LEC']);
  wsData.push(['〒',cust&&cust.postal?cust.postal:'','顧客コード',cust?cust.id:'','','〒120-0005 東京都足立区綾瀬7-4-1']);
  wsData.push(['住所',cust?cust.pref+(cust.city||''):'','','','','TEL. 03-5849-5563  FAX. 03-5849-5564']);
  var exSalesP=order.salesPersonOverride||(cust&&cust.salesPerson?cust.salesPerson:'')||'齋藤 勝';
  var exPayTerms=order.paymentTerms||'前払い（銀行振り込み）';
  wsData.push(['電話番号',cust&&cust.phone?cust.phone:'','FAX番号',cust&&cust.fax?cust.fax:'','','登録番号:T4040001077220  担当者: '+exSalesP]);
  if(cust&&cust.contactPerson)wsData.push(['ご担当',cust.contactPerson+' 様']);
  wsData.push([]);
  wsData.push(['件名',q.subject,'','担当者',exSalesP]);
  wsData.push([cfg.dateLabel,tdSlash(),'','伝票コード',q.slipCode]);
  if(docType==='quote'){
    wsData.push(['納期','別途相談','','有効期限','御見積後1ヶ月']);
  }
  wsData.push(['受渡地',cust?cust.pref+(cust.city||''):'','','支払条件',exPayTerms]);
  wsData.push([]);
  if(!isReceipt){wsData.push([cfg.amountLabel,q.total]);wsData.push([]);}
  if(isReceipt){
    wsData.push(['商品コード','商品名称','数量','単位','備考']);
    q.rows.forEach(function(r){
      if(r.configNote){wsData.push(['',r.configNote,'','','']);}
      wsData.push([r.code,r.name,r.qty,r.unit,'']);
    });
  }else{
    wsData.push(['商品コード','商品名称','数量','単位','単価','金額','税','備考']);
    q.rows.forEach(function(r){
      if(r.configNote){wsData.push(['',r.configNote,'','','','','','']);}
      wsData.push([r.code,r.name,r.qty,r.unit,r.price===''?'':r.price,r.amount,r.tax||'','']);
    });
  }
  wsData.push([]);
  if(!isReceipt){
    wsData.push(['','','','','税抜合計',q.subtotal]);
    wsData.push(['','','','','消費税額',q.tax]);
    wsData.push(['','','','','税込合計',q.total]);
    wsData.push([]);
    wsData.push(['','','','','10%対象',q.subtotal,'(税)',q.tax]);
    wsData.push(['','','','','8%軽減対',0,'(税)',0]);
    wsData.push(['','','','','非課税対象',0]);
  }
  wsData.push([]);
  if(docType==='invoice'){
    wsData.push(['お振込手数料はお客様にてご負担ください。']);
    wsData.push(['振込先: 商工組合中央金庫 上野支店 普通 1300806 カ)レック']);
  }else if(docType==='quote'){
    wsData.push(['支払条件: '+exPayTerms]);
    wsData.push(['有効期限: 御見積後1ヶ月']);
    wsData.push(['振込先: 商工組合中央金庫 上野支店 普通 1300806 カ)レック']);
  }
  if(order.notes){wsData.push([]);wsData.push(['備考: '+order.notes]);}
  if(order.productNotes){var pn=typeof order.productNotes==='string'?order.productNotes:String(order.productNotes||'');wsData.push([]);wsData.push(['商品備考: '+pn]);}
  var ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:14},{wch:42},{wch:8},{wch:8},{wch:12},{wch:14},{wch:8},{wch:20}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws,cfg.sheet);
  XLSX.writeFile(wb,cfg.sheet+'_'+order.no+'.xlsx');
}

                  h('tbody',null,lr.details.map(function(d,i){
                    return h('tr',{key:i},h('td',null,d.label),h('td',{style:{textAlign:'right'}},fm(d.qty)),h('td',{style:{textAlign:'right'}},'¥'+fm(d.cost)),h('td',{style:{textAlign:'right',fontWeight:700}},'¥'+fm(d.val)));
                  }))
                )
              );
            })
          );
        })()
      )
    ):null,
    /* Edit log modal (E6) */
    showEditLog[0]?h(Modal,{show:true,title:'在庫編集履歴（セッション内）',w:700,onClose:function(){showEditLog[1](false);}},
      h('div',{style:{maxHeight:'60vh',overflow:'auto'}},
        (function(){
          if(!EDIT_LOG.length)return h('p',{style:{textAlign:'center',color:'var(--g400)',padding:20}},'編集履歴はありません');
          return h('table',{className:'tbl'},
            h('thead',null,h('tr',null,h('th',null,'日時'),h('th',null,'編集者'),h('th',null,'部材'),h('th',null,'倉庫'),h('th',null,'旧値'),h('th',null,'→'),h('th',null,'新値'))),
            h('tbody',null,EDIT_LOG.slice().reverse().map(function(e,i){
              return h('tr',{key:i},h('td',{style:{fontSize:9}},e.timestamp),h('td',{style:{fontWeight:600,color:'var(--nv)'}},e.editor||''),h('td',null,e.label),h('td',null,WH_MAP[e.wh]?WH_MAP[e.wh].s:e.wh),h('td',{style:{textAlign:'right'}},e.oldVal),h('td',null,'→'),h('td',{style:{textAlign:'right',fontWeight:700}},e.newVal));
            }))
          );
        })()
      )
    ):null
  );
}

/* ========== RENDER ========== */
ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
