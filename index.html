    allBom=allBom.concat(bom);
  });
  /* Calculate total weight from boxes */
  var tw=0,totalBoxes=0;
  allBom.forEach(function(b){
    var iri,bw;
    if(b.isDoor){
      iri=getIrisu(b.key,b.doorSub||b.sub);bw=getBoxWt(b.key,b.doorSub||b.sub);
    }else if(b.sub!==undefined){
      iri=getIrisu(b.key,b.sub);bw=getBoxWt(b.key,b.sub);
    }else{
      iri=getIrisu(b.key);bw=getBoxWt(b.key);
    }
    var boxes=Math.ceil(b.qty/iri);
    tw+=boxes*bw;totalBoxes+=boxes;
  });
  /* Add base board weight */
  var baseIslands=lines.reduce(function(s,l){return s+l.islands;},0);
  var baseIri=getIrisu('base',lines[0]?sizeObj(lines[0].size).grp:'sml');
  var baseBw=getBoxWt('base',lines[0]?sizeObj(lines[0].size).grp:'sml');
  var baseBoxes=Math.ceil(baseIslands/baseIri);
  tw+=baseBoxes*baseBw;totalBoxes+=baseBoxes;
  var base=tw*rate+MISC_FEE;
  var ship=Math.ceil(base*MARKUP);
  if(tw>CHARTER_KG)ship+=CHARTER_FEE;
  return{weight:Math.round(tw*10)/10,rate:rate,shipping:ship,charter:tw>CHARTER_KG,boxes:totalBoxes};
}

/* ========== HELD TRACKING ========== */
var HELD={};
(function(){
  LINES.forEach(function(ln){
    HELD[ln.id]={};
    WH_IDS.forEach(function(w){HELD[ln.id][w]={door:{},doorH:{}};});
  });
})();

function gs(line,wh,key,sub){
  var s=STK[line]&&STK[line][wh];if(!s)return 0;
  if(sub!==undefined){var o=s[key];return(o&&o[sub])||0;}
  return s[key]||0;
}
function gd(line,wh,color,size,doorKey){
  var dk=doorKey||'door';
  var s=STK[line]&&STK[line][wh]&&STK[line][wh][dk];
  return(s&&s[color]&&s[color][size])||0;
}
function gh(line,wh,key,sub){
  var s=HELD[line]&&HELD[line][wh];if(!s)return 0;
  if(sub!==undefined){var o=s[key];return(o&&o[sub])||0;}
  return s[key]||0;
}
function ghd(line,wh,color,size,doorKey){
  var dk=doorKey||'door';
  var s=HELD[line]&&HELD[line][wh]&&HELD[line][wh][dk];
  return(s&&s[color]&&s[color][size])||0;
}
function avail(line,wh,key,sub){return gs(line,wh,key,sub)-gh(line,wh,key,sub);}
function availD(line,wh,color,size,doorKey){return gd(line,wh,color,size,doorKey)-ghd(line,wh,color,size,doorKey);}
function hasStock(line,wh){return !!(STK[line]&&STK[line][wh]);}
function totalAvailD(line,color,size){
  /* Total across all warehouses for both door and doorH */
  var t=0;WH_IDS.forEach(function(w){if(hasStock(line,w)){t+=availD(line,w,color,size,'door');t+=availD(line,w,color,size,'doorH');}});return t;
}
function isOrderColor(lineId,colorId){
  var cs=LINE_COLORS[lineId]||[];var c=cs.find(function(x){return x.v===colorId;});
  return c&&c.order;
}

/* ========== BOM CALCULATION ========== */
function sizeObj(v){return SIZES.find(function(s){return s.v===v;})||SIZES[0];}
function calcBOM(size,islands,tiers,lock,type){
  var n=islands*tiers,so=sizeObj(size),grp=so.grp,bom=[];
  var isOpen=type==='open',isPersonal=type==='personal';
  /* Boards always included */
  bom.push({key:'top',sub:grp,qty:n,label:'トップボード('+grp.toUpperCase()+')',reason:n+'台×1'});
  if(so.dbl){
    bom.push({key:'side',sub:'SS',qty:n*4,label:'サイドボード(SS)',reason:n+'台×4'});
    bom.push({key:'back',sub:'SS',qty:n*2,label:'バックボード(SS)',reason:n+'台×2'});
  }else{
    bom.push({key:'side',sub:size,qty:n*2,label:'サイドボード('+size+')',reason:n+'台×2'});
    bom.push({key:'back',sub:size,qty:n*1,label:'バックボード('+size+')',reason:n+'台×1'});
  }
  /* Door: not for open type. Personal uses doorH (handle-hole doors) */
  if(!isOpen){
    var dk=isPersonal?'doorH':'door';
    bom.push({key:dk,qty:n,label:(isPersonal?'扉〈ホタ〉':'扉')+'('+size+')',reason:n+'台×1',isDoor:true,doorSub:size});
  }
  /* Base always */
  bom.push({key:'base',sub:grp,qty:islands,label:'ベースボード('+grp.toUpperCase()+')',reason:islands+'島×1'});
  /* Vertical joints */
  if(tiers>1){
    var vc=islands*(tiers-1);
    bom.push({key:'vj',sub:grp,qty:vc*3,label:'上下ジョイント('+grp.toUpperCase()+')',reason:vc+'接続×3'});
  }
  /* Side joints */
  if(islands>1){
    var sc=(islands-1)*tiers;
    bom.push({key:'sj',sub:grp,qty:sc*2,label:'サイドジョイント('+grp.toUpperCase()+')',reason:sc+'接続×2'});
  }
  /* Handle: personal only, S/M/L only */
  if(isPersonal&&['S','M','L'].indexOf(size)>=0){
    bom.push({key:'handle',qty:n,label:'ハンドル(トッテ)',reason:n+'台×1'});
  }
  /* Lock: standard=optional, personal=required, open=none */
  if(!isOpen&&lock&&lock!=='none'){
    bom.push({key:lock,qty:n,label:LOCK_TYPES.find(function(lt){return lt.v===lock;})?LOCK_TYPES.find(function(lt){return lt.v===lock;}).l:'錠前',reason:n+'台×1'});
  }
  return bom;
}

function checkWH(line,wh,bom,color,size){
  var items=[],ok=true;
  var orderCol=isOrderColor(line,color);
  bom.forEach(function(b){
    var stock,held,free;
    if(b.isDoor){
      if(orderCol){
        items.push({label:b.label,need:b.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var dk=b.key;/* 'door' or 'doorH' */
      stock=gd(line,wh,color,size,dk);held=ghd(line,wh,color,size,dk);free=stock-held;
    }else if(b.sub!==undefined){
      stock=gs(line,wh,b.key,b.sub);held=gh(line,wh,b.key,b.sub);free=stock-held;
    }else{
      stock=gs(line,wh,b.key);held=gh(line,wh,b.key);free=stock-held;
    }
    var pass=free>=b.qty;
    if(!pass)ok=false;
    items.push({label:b.label,need:b.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,b.qty-free)});
  });
  return{ok:ok,items:items};
}

function holdBOM(line,wh,bom,color,size){
  bom.forEach(function(b){
    if(b.isDoor){
      if(isOrderColor(line,color))return;
      var dk=b.key;/* 'door' or 'doorH' */
      if(!HELD[line][wh][dk])HELD[line][wh][dk]={};
      if(!HELD[line][wh][dk][color])HELD[line][wh][dk][color]={};
      HELD[line][wh][dk][color][size]=(HELD[line][wh][dk][color][size]||0)+b.qty;
    }else if(b.sub!==undefined){
      if(!HELD[line][wh][b.key])HELD[line][wh][b.key]={};
      HELD[line][wh][b.key][b.sub]=(HELD[line][wh][b.key][b.sub]||0)+b.qty;
    }else{
      HELD[line][wh][b.key]=(HELD[line][wh][b.key]||0)+b.qty;
    }
  });
}

function releaseBOM(line,wh,bom,color,size){
  bom.forEach(function(b){
    if(b.isDoor){
      if(isOrderColor(line,color))return;
      var dk=b.key;
      if(HELD[line][wh][dk]&&HELD[line][wh][dk][color]){
        HELD[line][wh][dk][color][size]=Math.max(0,(HELD[line][wh][dk][color][size]||0)-b.qty);
      }
    }else if(b.sub!==undefined){
      if(HELD[line][wh][b.key]){
        HELD[line][wh][b.key][b.sub]=Math.max(0,(HELD[line][wh][b.key][b.sub]||0)-b.qty);
      }
    }else{
      HELD[line][wh][b.key]=Math.max(0,(HELD[line][wh][b.key]||0)-b.qty);
    }
  });
}

function shipOrder(order){
  order.lines.forEach(function(ln){
    var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type);
    var orderCol=isOrderColor(ln.line,ln.color);
    bom.forEach(function(b){
      if(b.isDoor){
        if(orderCol)return;
        var dk=b.key;
        if(STK[ln.line]&&STK[ln.line][order.wh]&&STK[ln.line][order.wh][dk]&&STK[ln.line][order.wh][dk][ln.color]){
          STK[ln.line][order.wh][dk][ln.color][ln.size]=Math.max(0,(STK[ln.line][order.wh][dk][ln.color][ln.size]||0)-b.qty);
        }
      }else if(b.sub!==undefined){
        if(STK[ln.line]&&STK[ln.line][order.wh]&&STK[ln.line][order.wh][b.key]){
          STK[ln.line][order.wh][b.key][b.sub]=Math.max(0,(STK[ln.line][order.wh][b.key][b.sub]||0)-b.qty);
        }
      }else{
        if(STK[ln.line]&&STK[ln.line][order.wh]){
          STK[ln.line][order.wh][b.key]=Math.max(0,(STK[ln.line][order.wh][b.key]||0)-b.qty);
        }
      }
    });
    releaseBOM(ln.line,order.wh,bom,ln.color,ln.size);
  });
}

/* ========== CHECK ALL LINES AT WAREHOUSE ========== */
function checkAllLinesWH(lines,wh){
  var allOk=true,allItems=[];
  /* Group lines by product line (jp01, jp2, tw, sa) since they use separate inventory pools */
  var byLine={};
  lines.forEach(function(ln){
    if(!byLine[ln.line])byLine[ln.line]=[];
    byLine[ln.line].push(ln);
  });
  Object.keys(byLine).forEach(function(lineId){
    var group=byLine[lineId];
    /* Check if this product line exists at the warehouse */
    if(!hasStock(lineId,wh)){
      allOk=false;
      allItems.push({label:'製品ライン「'+(LINES.find(function(l){return l.id===lineId;})||{}).name+'」取扱なし',need:0,stock:0,held:0,free:0,ok:false,shortage:0});
      return;
    }
    /* Aggregate BOM quantities across all order lines in this product line group */
    var structAgg={};/* key: "key|sub" -> {qty, label, key, sub} */
    var doorAgg={};/* key: "doorKey|color|size" -> {qty, label, doorKey, color, size} */
    var simpleAgg={};/* key: "key" -> {qty, label, key} */
    group.forEach(function(ln){
      var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type);
      var orderCol=isOrderColor(lineId,ln.color);
      bom.forEach(function(b){
        if(b.isDoor){
          if(orderCol){
            /* Order colors are always OK, track them separately */
            var oKey='order|'+b.key+'|'+ln.color+'|'+ln.size;
            if(!doorAgg[oKey])doorAgg[oKey]={qty:0,label:b.label,doorKey:b.key,color:ln.color,size:ln.size,isOrder:true};
            doorAgg[oKey].qty+=b.qty;
          }else{
            var dKey=b.key+'|'+ln.color+'|'+ln.size;
            if(!doorAgg[dKey])doorAgg[dKey]={qty:0,label:b.label,doorKey:b.key,color:ln.color,size:ln.size,isOrder:false};
            doorAgg[dKey].qty+=b.qty;
          }
        }else if(b.sub!==undefined){
          var sKey=b.key+'|'+b.sub;
          if(!structAgg[sKey])structAgg[sKey]={qty:0,label:b.label,key:b.key,sub:b.sub};
          structAgg[sKey].qty+=b.qty;
        }else{
          if(!simpleAgg[b.key])simpleAgg[b.key]={qty:0,label:b.label,key:b.key};
          simpleAgg[b.key].qty+=b.qty;
        }
      });
    });
    /* Check aggregated structural parts */
    Object.keys(structAgg).forEach(function(k){
      var a=structAgg[k];
      var stock=gs(lineId,wh,a.key,a.sub);
      var held=gh(lineId,wh,a.key,a.sub);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated doors */
    Object.keys(doorAgg).forEach(function(k){
      var a=doorAgg[k];
      if(a.isOrder){
        allItems.push({label:a.label,need:a.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var stock=gd(lineId,wh,a.color,a.size,a.doorKey);
      var held=ghd(lineId,wh,a.color,a.size,a.doorKey);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated simple parts */
    Object.keys(simpleAgg).forEach(function(k){
      var a=simpleAgg[k];
      var stock=gs(lineId,wh,a.key);
      var held=gh(lineId,wh,a.key);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
  });
  return{ok:allOk,items:allItems};
}

/* ========== MAIN PAGE: INVENTORY CHECK & QUOTE ========== */
function InvPage(p){
  var cust=p.selCust;
  var ln=us('jp01'),sz=us('M'),tp=us('standard'),cl=us('pb'),lk=us('dial');
  var isl=us(9),tier=us(3);
  var lines=us([]),whResults=us([]),selWH=us(null);
  var multiWH=us([]);
  var showQuote=us(false),quoteOrder=us(null);
  var discount=us(0);

  var colors=LINE_COLORS[ln[0]]||[];
  var sizes=LINE_SIZES[ln[0]]||[];
  function changeLine(v){ln[1](v);cl[1]((LINE_COLORS[v]||[])[0]?LINE_COLORS[v][0].v:'');var ss=LINE_SIZES[v]||[];sz[1](ss[0]||'S');}
  var qty=(parseInt(isl[0])||1)*(parseInt(tier[0])||1);

  function addLine(){
    if(!cust)return;
    var lock=tp[0]==='open'?'none':lk[0];
    if(tp[0]==='personal'&&lock==='none')lock='dial';
    var nl=lines[0].concat([{id:Date.now(),line:ln[0],size:sz[0],type:tp[0],color:cl[0],qty:qty,islands:parseInt(isl[0])||1,tiers:parseInt(tier[0])||1,lock:lock}]);
    lines[1](nl);doCheck(nl);
  }
  function remLine(id){var nl=lines[0].filter(function(l){return l.id!==id;});lines[1](nl);nl.length?doCheck(nl):(whResults[1]([]),multiWH[1]([]));}

  function doCheck(ls){
    if(!ls||!ls.length){whResults[1]([]);multiWH[1]([]);return;}
    var results=[];
    WH_IDS.forEach(function(wId){
      var anyLine=ls.some(function(l){return hasStock(l.line,wId);});
      if(!anyLine){results.push({whId:wId,whName:WH_MAP[wId].n,check:{ok:false,items:[{label:'取扱製品なし',need:0,stock:0,held:0,free:0,ok:false,shortage:0}]},noLine:true});return;}
      var check=checkAllLinesWH(ls,wId);
      var ship=cust?calcShipping(ls,wId,cust.pref):null;
      results.push({whId:wId,whName:WH_MAP[wId].n,check:check,ship:ship});
    });
    /* Sort: OK first, then v01 priority (deplete old stock), then by shipping cost */
    var hasV01=ls.some(function(l){return l.line==='jp01';});
    results.sort(function(a,b){
      if(a.check.ok&&!b.check.ok)return -1;if(!a.check.ok&&b.check.ok)return 1;
      /* If order includes jp01 lines, prioritize warehouses that have jp01 stock */
      if(hasV01&&a.check.ok&&b.check.ok){
        var aHasV01=hasStock('jp01',a.whId);
        var bHasV01=hasStock('jp01',b.whId);
        if(aHasV01&&!bHasV01)return -1;if(!aHasV01&&bHasV01)return 1;
      }
      if(a.ship&&b.ship)return a.ship.shipping-b.ship.shipping;
      return 0;
    });
    whResults[1](results);
    var best=results.find(function(r){return r.check.ok&&!r.noLine;});
    selWH[1](best?best.whId:null);
    /* If no single warehouse can fulfill, try pairs */
    var okResults=results.filter(function(r){return r.check.ok&&!r.noLine;});
    if(okResults.length===0){
      var multiOpts=[];
      /* Build aggregated BOM per product line for combined checking */
      var bomByLine={};
      ls.forEach(function(ln){
        if(!bomByLine[ln.line])bomByLine[ln.line]=[];
        var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type);
        bom.forEach(function(b){
          bomByLine[ln.line].push({b:b,color:ln.color,size:ln.size,orderCol:isOrderColor(ln.line,ln.color)});
        });
      });
      /* Aggregate BOM by product line, similar to checkAllLinesWH */
      var aggBOM=[];/* Array of {lineId, key, sub, color, size, doorKey, isDoor, isOrder, qty, label} */
      Object.keys(bomByLine).forEach(function(lineId){
        var structAgg={},doorAgg={},simpleAgg={};
        bomByLine[lineId].forEach(function(item){
          var b=item.b;
          if(b.isDoor){
            if(item.orderCol){return;/* Skip order colors */}
            var dKey=b.key+'|'+item.color+'|'+item.size;
            if(!doorAgg[dKey])doorAgg[dKey]={qty:0,label:b.label,doorKey:b.key,color:item.color,size:item.size};
            doorAgg[dKey].qty+=b.qty;
          }else if(b.sub!==undefined){
            var sKey=b.key+'|'+b.sub;
            if(!structAgg[sKey])structAgg[sKey]={qty:0,label:b.label,key:b.key,sub:b.sub};
            structAgg[sKey].qty+=b.qty;
          }else{
            if(!simpleAgg[b.key])simpleAgg[b.key]={qty:0,label:b.label,key:b.key};
            simpleAgg[b.key].qty+=b.qty;
          }
        });
        Object.keys(structAgg).forEach(function(k){var a=structAgg[k];aggBOM.push({lineId:lineId,key:a.key,sub:a.sub,isDoor:false,qty:a.qty,label:a.label});});
        Object.keys(doorAgg).forEach(function(k){var a=doorAgg[k];aggBOM.push({lineId:lineId,doorKey:a.doorKey,color:a.color,size:a.size,isDoor:true,qty:a.qty,label:a.label});});
        Object.keys(simpleAgg).forEach(function(k){var a=simpleAgg[k];aggBOM.push({lineId:lineId,key:a.key,isDoor:false,qty:a.qty,label:a.label});});
      });
      /* Try all pairs of warehouses */
      for(var i=0;i<WH_IDS.length;i++){
        for(var j=i+1;j<WH_IDS.length;j++){
          var wA=WH_IDS[i],wB=WH_IDS[j];
          var pairOk=true;
          var pairItems=[];
          aggBOM.forEach(function(ab){
            var stockA=0,heldA=0,stockB=0,heldB=0;
            if(ab.isDoor){
              if(hasStock(ab.lineId,wA)){stockA=gd(ab.lineId,wA,ab.color,ab.size,ab.doorKey);heldA=ghd(ab.lineId,wA,ab.color,ab.size,ab.doorKey);}
              if(hasStock(ab.lineId,wB)){stockB=gd(ab.lineId,wB,ab.color,ab.size,ab.doorKey);heldB=ghd(ab.lineId,wB,ab.color,ab.size,ab.doorKey);}
            }else if(ab.sub!==undefined){
              if(hasStock(ab.lineId,wA)){stockA=gs(ab.lineId,wA,ab.key,ab.sub);heldA=gh(ab.lineId,wA,ab.key,ab.sub);}
              if(hasStock(ab.lineId,wB)){stockB=gs(ab.lineId,wB,ab.key,ab.sub);heldB=gh(ab.lineId,wB,ab.key,ab.sub);}
            }else{
              if(hasStock(ab.lineId,wA)){stockA=gs(ab.lineId,wA,ab.key);heldA=gh(ab.lineId,wA,ab.key);}
              if(hasStock(ab.lineId,wB)){stockB=gs(ab.lineId,wB,ab.key);heldB=gh(ab.lineId,wB,ab.key);}
            }
            var freeA=stockA-heldA,freeB=stockB-heldB;
            var combined=freeA+freeB;
            var pass=combined>=ab.qty;
            if(!pass)pairOk=false;
            pairItems.push({label:ab.label,need:ab.qty,stockA:stockA,stockB:stockB,freeA:freeA,freeB:freeB,combined:combined,ok:pass,shortage:Math.max(0,ab.qty-combined)});
          });
          if(pairOk){
            var shipA=cust?calcShipping(ls,wA,cust.pref):null;
            var shipB=cust?calcShipping(ls,wB,cust.pref):null;
            var combinedShip=(shipA?shipA.shipping:0)+(shipB?shipB.shipping:0);
            multiOpts.push({whA:wA,whB:wB,nameA:WH_MAP[wA].n,nameB:WH_MAP[wB].n,items:pairItems,shipA:shipA,shipB:shipB,combinedShip:combinedShip});
          }
        }
      }
      /* Sort by combined shipping cost */
      multiOpts.sort(function(a,b){return a.combinedShip-b.combinedShip;});
      multiWH[1](multiOpts);
    }else{
      multiWH[1]([]);
    }
  }

  function doHoldAndQuote(){
    if(!lines[0].length||!selWH[0])return;
    var wh=selWH[0];
    /* Hold all lines */
    var allOk=true;
    lines[0].forEach(function(ln){
      if(!hasStock(ln.line,wh)){allOk=false;return;}
      var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type);
      var check=checkWH(ln.line,wh,bom,ln.color,ln.size);
      if(!check.ok)allOk=false;
    });
    if(!allOk){p.toast('在庫不足のため仮押さえできません');return;}
    lines[0].forEach(function(ln){
      var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type);
      holdBOM(ln.line,wh,bom,ln.color,ln.size);
    });
    var shipInfo=cust?calcShipping(lines[0],wh,cust.pref):null;
    var no='QT-2026-'+String(nextON++).padStart(3,'0');
    var order={no:no,cid:cust.id,wh:wh,status:'仮押さえ',date:td2(),lines:lines[0].slice(),shipping:shipInfo?shipInfo.shipping:0,discount:parseInt(discount[0])||0};
    ORDERS.push(order);
    quoteOrder[1](order);showQuote[1](true);
    p.toast('仮押さえ＆見積作成完了: '+no);
    lines[1]([]);whResults[1]([]);p.bump();
  }

  function doQuoteOnly(){
    if(!lines[0].length)return;
    var wh=selWH[0]||'honsha';
    var shipInfo=cust?calcShipping(lines[0],wh,cust.pref):null;
    var no='QT-2026-'+String(nextON++).padStart(3,'0');
    var order={no:no,cid:cust.id,wh:wh,status:'見積作成',date:td2(),lines:lines[0].slice(),shipping:shipInfo?shipInfo.shipping:0,discount:parseInt(discount[0])||0};
    ORDERS.push(order);
    quoteOrder[1](order);showQuote[1](true);
    p.toast('見積書作成: '+no);
    p.bump();
  }

  function printQuote(order,docType){
    var q=generateQuoteHTML(order,docType||'quote');
    var w=window.open('','_blank','width=800,height=1000');
    w.document.write(q.html);w.document.close();
    setTimeout(function(){w.print();},500);
  }

  if(!cust)return h('div',{className:'page'+(p.tab==='inv'?' show':'')},
    h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'55vh',color:'var(--g400)'}},
      h('p',{style:{fontSize:13,fontWeight:600,marginBottom:8}},'顧客管理タブから顧客を選択してください'),
      h('button',{className:'btn btn-nv',onClick:function(){p.setTab('cust');}},'顧客選択へ →')
    ));

  var colorObj=colors.find(function(c){return c.v===cl[0];});

  return h('div',{className:'page'+(p.tab==='inv'?' show':'')},
    h('div',{className:'cbar fi'},h('div',{style:{flex:1}},h('b',{style:{fontSize:13}},cust.name),h('span',{style:{fontSize:9,opacity:.7,marginLeft:8}},cust.id+' | '+cust.pref+(cust.city||'')+' | 地域: '+getRegion(cust.pref))),h('button',{className:'btn btn-xs btn-ol',style:{color:'#fff',borderColor:'rgba(255,255,255,.3)'},onClick:function(){p.setTab('cust');}},'変更')),

    h('div',{style:{display:'flex',gap:14,alignItems:'flex-start'}},
      /* LEFT: Config */
      h('div',{style:{width:320,flexShrink:0}},
        h('div',{className:'card',style:{marginBottom:8}},
          h('div',{className:'chd'},h('h3',null,'商品選択')),
          h('div',{style:{padding:10}},
            h('label',{style:{fontSize:8,fontWeight:600,color:'var(--g500)'}},'製品ライン'),
            h('div',{style:{display:'flex',gap:3,marginBottom:6}},LINES.map(function(l){
              return h('button',{key:l.id,className:'btn btn-xs '+(ln[0]===l.id?'btn-nv':'btn-ol'),onClick:function(){changeLine(l.id);}},l.mark+' '+l.name);
            })),
            h('div',{style:{display:'flex',gap:4,marginBottom:5}},
              h('div',{style:{flex:1}},h('label',{style:{fontSize:8,fontWeight:600,color:'var(--g500)'}},'サイズ'),
                h('select',{className:'inp',value:sz[0],onChange:function(e){sz[1](e.target.value);}},sizes.map(function(s){return h('option',{key:s,value:s},sizeObj(s).l);}))),
              h('div',{style:{flex:1}},h('label',{style:{fontSize:8,fontWeight:600,color:'var(--g500)'}},'タイプ'),
                h('select',{className:'inp',value:tp[0],onChange:function(e){tp[1](e.target.value);}},TYPES.map(function(t){return h('option',{key:t.v,value:t.v},t.l);})))
            ),
            h('label',{style:{fontSize:8,fontWeight:600,color:'var(--g500)'}},'カラー '+(colorObj?'【'+colorObj.l+'】':'')),
            h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',margin:'4px 0 8px'}},colors.map(function(c){
              var doorCount=totalAvailD(ln[0],c.v,sz[0]);
              var isOrder=!!c.order;
              return h('div',{key:c.v,style:{textAlign:'center',cursor:'pointer'},onClick:function(){cl[1](c.v);}},
                h('div',{className:'cd'+(cl[0]===c.v?' sel':''),style:{background:c.x,width:26,height:26,borderColor:cl[0]===c.v?'var(--nv)':'var(--g200)',position:'relative'}},
                  isOrder?h('span',{className:'order-mark'},'発注'):null
                ),
                h('div',{style:{fontSize:7,fontWeight:700,marginTop:1,color:isOrder?'#7C3AED':doorCount<=0?'#DC2626':doorCount<=10?'#D97706':'#065F46'}},isOrder?'受発注':fm(doorCount))

              h('div',{style:{flex:1}},h('label',{style:{fontSize:8,fontWeight:600,color:'var(--g500)'}},'島数（列）'),h('input',{className:'inp',type:'number',min:1,max:50,value:isl[0],onChange:function(e){isl[1](e.target.value);},style:{textAlign:'center',fontWeight:700,fontSize:14}})),

              h('select',{className:'inp',value:lk[0],onChange:function(e){lk[1](e.target.value);}},

    detail[1](null);
  }
  function openQuote(order,docType){
    var q=generateQuoteHTML(order,docType||'quote');
    var w=window.open('','_blank','width=800,height=1000');
    w.document.write(q.html);w.document.close();
    setTimeout(function(){w.print();},500);
  }

  return h('div',{className:'page'+(p.tab==='orders'?' show':'')},
    h('div',{className:'card'},
      h('div',{className:'chd'},h('h3',null,'案件管理（'+ORDERS.length+'件）'),
        h('div',{style:{display:'flex',gap:3}},
          h('button',{className:'btn btn-xs '+(filter[0]==='all'?'btn-nv':'btn-ol'),onClick:function(){filter[1]('all');}},'全て'),
          STATUS_FLOW.map(function(s){return h('button',{key:s,className:'btn btn-xs '+(filter[0]===s?'btn-nv':'btn-ol'),onClick:function(){filter[1](s);}},s);})
        )
      ),
      ORDERS.length===0?h('div',{style:{padding:30,textAlign:'center',color:'var(--g400)'}},'案件がありません。'):
      h('div',{className:'scy',style:{maxHeight:'72vh'}},h('table',{className:'tbl'},
        h('thead',null,h('tr',null,h('th',null,'No.'),h('th',null,'日付'),h('th',null,'顧客'),h('th',null,'明細'),h('th',null,'台数'),h('th',null,'倉庫'),h('th',null,'送料'),h('th',null,'ステータス'),h('th',null,'操作'))),
        h('tbody',null,fl.map(function(o){
          var c=CUSTS.find(function(x){return x.id===o.cid;});
          var totalQty=o.lines.reduce(function(s,l){return s+l.qty;},0);
          return h('tr',{key:o.no},
            h('td',null,h('b',null,o.no)),h('td',null,o.date),h('td',null,c?c.name:''),
            h('td',null,o.lines.length+'件'),
            h('td',{style:{fontWeight:700}},fm(totalQty)+'台'),
            h('td',null,(WH_MAP[o.wh]||{}).s||''),
            h('td',{style:{fontSize:9}},o.shipping?'¥'+fm(o.shipping):'-'),
            h('td',null,h('span',{className:'bg '+(STATUS_CLS[o.status]||'bg-b')},o.status)),
            h('td',null,
              h('button',{className:'btn btn-xs btn-ol',onClick:function(){detail[1](o);}},'詳細'),
              h('button',{className:'btn btn-xs btn-gn',style:{marginLeft:2},onClick:function(){openQuote(o,'quote');}},'見積'),
              h('button',{className:'btn btn-xs btn-nv',style:{marginLeft:2},onClick:function(){openQuote(o,'invoice');}},'請求'),
              h('button',{className:'btn btn-xs btn-or',style:{marginLeft:2},onClick:function(){openQuote(o,'delivery');}},'納品'),
              h('button',{className:'btn btn-xs btn-pr',style:{marginLeft:2},onClick:function(){openQuote(o,'receipt');}},'受領'),
              h('button',{className:'btn btn-xs btn-rd',style:{marginLeft:2},onClick:function(){openQuote(o,'shipping');}},'出荷'),
              h('button',{className:'btn btn-xs btn-tl',style:{marginLeft:2},onClick:function(){generateExcel(o,'quote');}},'Excel')
            )
          );
        }))
      ))
    ),
    detail[0]?h(Modal,{show:true,title:'案件詳細 — '+detail[0].no,w:650,onClose:function(){detail[1](null);},
      footer:h('button',{className:'btn btn-ol',onClick:function(){detail[1](null);}},'閉じる')},
      h('div',null,
        h('div',{style:{marginBottom:10,display:'flex',gap:10,flexWrap:'wrap',fontSize:11}},
          h('div',null,h('b',null,'日付: '),detail[0].date),
          h('div',null,h('b',null,'顧客: '),(CUSTS.find(function(c){return c.id===detail[0].cid;})||{}).name||''),
          h('div',null,h('b',null,'倉庫: '),(WH_MAP[detail[0].wh]||{}).n||''),
          h('div',null,h('b',null,'送料: '),detail[0].shipping?'¥'+fm(detail[0].shipping):'-')
        ),
        h('div',{style:{marginBottom:10}},
          h('b',{style:{fontSize:10}},'ステータス遷移:'),
          h('div',{style:{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}},STATUS_FLOW.map(function(s){
            var isCurrent=detail[0].status===s;
            var idx=STATUS_FLOW.indexOf(s);
            var curIdx=STATUS_FLOW.indexOf(detail[0].status);
            var isNext=idx===curIdx+1;
            return h('button',{key:s,className:'btn btn-xs '+(isCurrent?'btn-gn':isNext?'btn-or':'btn-ol'),
              disabled:!isNext,style:{opacity:isNext||isCurrent?1:.5},
              onClick:function(){if(isNext)changeStatus(detail[0],s);}
            },(isCurrent?'● ':'')+s);
          }))
        ),
        h('b',{style:{fontSize:10}},'明細:'),
        h('table',{className:'tbl',style:{marginTop:4}},
          h('thead',null,h('tr',null,h('th',null,'製品'),h('th',null,'サイズ'),h('th',null,'カラー'),h('th',null,'タイプ'),h('th',null,'構成'),h('th',null,'台数'))),
          h('tbody',null,detail[0].lines.map(function(l,i){
            var co=(LINE_COLORS[l.line]||[]).find(function(c){return c.v===l.color;});
            var lo=LINES.find(function(x){return x.id===l.line;});
            var to=TYPES.find(function(x){return x.v===l.type;});
            return h('tr',{key:i},
              h('td',null,lo?lo.name:''),
              h('td',null,sizeObj(l.size).l),
              h('td',null,h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:2,background:co?co.x:'#ccc',verticalAlign:'middle',marginRight:3}}),co?co.l:''),
              h('td',null,to?to.l:''),
              h('td',null,l.islands+'列×'+l.tiers+'段'),
              h('td',{style:{fontWeight:700}},fm(l.qty)+'台')
            );
          }))
        )
      )
    ):null
  );
}

/* ========== PARTS INVENTORY PAGE ========== */
function PartsPage(p){
  var selLine=us('jp01'),viewMode=us('struct'),editModal=us(null),bump=us(0);
  var lineObj=LINES.find(function(l){return l.id===selLine[0];});
  var whs=WH_IDS.filter(function(w){return hasStock(selLine[0],w);});
  var colors=LINE_COLORS[selLine[0]]||[];
  var sizes=LINE_SIZES[selLine[0]]||[];

  function startEdit(label,lineId,key,sub,isDoor,color){
    var vals={};
    WH_IDS.forEach(function(w){
      if(!hasStock(lineId,w)){vals[w]=0;return;}
      if(isDoor){vals[w]=gd(lineId,w,color,sub,key);}
      else if(sub!==undefined){vals[w]=gs(lineId,w,key,sub);}
      else{vals[w]=gs(lineId,w,key);}
    });
    editModal[1]({label:label,lineId:lineId,key:key,sub:sub,isDoor:isDoor,color:color,vals:vals});
  }
  function saveEdit(){
    var e=editModal[0];if(!e)return;
    WH_IDS.forEach(function(w){
      if(!STK[e.lineId])return;
      if(!STK[e.lineId][w])return;
      var v=parseInt(e.vals[w])||0;
      if(e.isDoor){
        var dk=e.key;/* 'door' or 'doorH' */
        if(!STK[e.lineId][w][dk])STK[e.lineId][w][dk]={};
        if(!STK[e.lineId][w][dk][e.color])STK[e.lineId][w][dk][e.color]={};
        STK[e.lineId][w][dk][e.color][e.sub]=v;
      }else if(e.sub!==undefined){
        if(!STK[e.lineId][w][e.key])STK[e.lineId][w][e.key]={};
        STK[e.lineId][w][e.key][e.sub]=v;
      }else{
        STK[e.lineId][w][e.key]=v;
      }
    });
    editModal[1](null);bump[1](bump[0]+1);
    p.toast('在庫数を更新しました');
  }
  function updateEditVal(wh,v){
    var e=Object.assign({},editModal[0]);
    e.vals=Object.assign({},e.vals);e.vals[wh]=v;
    editModal[1](e);
  }

  var structRows=[
    {label:'トップボード(SML)',key:'top',sub:'sml'},
    {label:'トップボード(SS/3S)',key:'top',sub:'ss'},
    {label:'ベース(SML)',key:'base',sub:'sml'},
    {label:'ベース(SS/3S)',key:'base',sub:'ss'}
  ];
  sizes.forEach(function(s){if(s!=='SSA')structRows.push({label:'サイドボード('+s+')',key:'side',sub:s});});
  sizes.forEach(function(s){if(s!=='SSA')structRows.push({label:'バックボード('+s+')',key:'back',sub:s});});
  structRows=structRows.concat([
    {label:'上下ジョイント(SML)',key:'vj',sub:'sml'},
    {label:'上下ジョイント(SS/3S)',key:'vj',sub:'ss'},
    {label:'サイドジョイント(SML)',key:'sj',sub:'sml'},
    {label:'サイドジョイント(SS/3S)',key:'sj',sub:'ss'},
    {label:'ハンドル',key:'handle'},
    {label:'ダイヤル錠',key:'dial'},
    {label:'南京錠',key:'padlock'},
    {label:'シリンダー錠',key:'cylinder'},
    {label:'コインリターン錠',key:'coinReturn'}
  ]);

  return h('div',{className:'page'+(p.tab==='parts'?' show':'')},
    h('div',{className:'card'},
      h('div',{className:'chd'},h('h3',null,'部材在庫一覧'),
        h('div',{style:{display:'flex',gap:3}},
          LINES.map(function(l){return h('button',{key:l.id,className:'btn btn-xs '+(selLine[0]===l.id?'btn-nv':'btn-ol'),onClick:function(){selLine[1](l.id);}},l.mark+' '+l.name);}),
          h('span',{style:{margin:'0 4px',color:'var(--g300)'}},'|'),
          h('button',{className:'btn btn-xs '+(viewMode[0]==='struct'?'btn-nv':'btn-ol'),onClick:function(){viewMode[1]('struct');}},'構造部材'),
          h('button',{className:'btn btn-xs '+(viewMode[0]==='door'?'btn-nv':'btn-ol'),onClick:function(){viewMode[1]('door');}},'扉(カラー別)')
        )
      ),
      h('div',{className:'scy',style:{maxHeight:'72vh'}},
        viewMode[0]==='struct'?h('table',{className:'tbl'},
          h('thead',null,h('tr',null,
            h('th',null,'部材'),
            whs.map(function(w){return h('th',{key:w,style:{textAlign:'right'}},WH_MAP[w].s);}),
            h('th',{style:{textAlign:'right',background:'var(--gnp)'}},'合計'),
            h('th',null,'')
          )),
          h('tbody',null,structRows.map(function(row){
            var total=0;
            return h('tr',{key:row.label+row.key+(row.sub||'')},
              h('td',{style:{fontWeight:600}},row.label),
              whs.map(function(w){
                var v=row.sub!==undefined?avail(selLine[0],w,row.key,row.sub):avail(selLine[0],w,row.key);
                total+=v;
                return h('td',{key:w,style:{textAlign:'right',fontWeight:700,color:v<=0?'#DC2626':v<=10?'#D97706':'#065F46'}},fm(v));
              }),
              h('td',{style:{textAlign:'right',fontWeight:900,background:'#F0FDF4'}},fm(total)),
              h('td',null,h('button',{className:'btn btn-xs btn-ol',onClick:function(){startEdit(row.label,selLine[0],row.key,row.sub,false,null);}},'編集'))
            );
          }))
        ):
        h('table',{className:'tbl'},
          h('thead',null,h('tr',null,
            h('th',null,'カラー'),
            sizes.filter(function(s){return s!=='SSA';}).map(function(s){return h('th',{key:s,style:{textAlign:'center'}},s);}),
            h('th',null,'倉庫'),h('th',null,'')
          )),
          h('tbody',null,(function(){
            var rows=[];
            whs.forEach(function(w){
              colors.forEach(function(c){
                var hasAnyD=false,hasAnyH=false;
                sizes.forEach(function(s){
                  if(s!=='SSA'){
                    if(availD(selLine[0],w,c.v,s,'door')>0)hasAnyD=true;
                    if(availD(selLine[0],w,c.v,s,'doorH')>0)hasAnyH=true;
                  }
                });
                if(hasAnyD){
                  rows.push(h('tr',{key:w+'-d-'+c.v},
                    h('td',null,
                      h('span',{style:{display:'inline-block',width:12,height:12,borderRadius:2,background:c.x,verticalAlign:'middle',marginRight:4}}),
                      c.l,' (常設)',c.order?h('span',{style:{fontSize:7,color:'#DC2626',marginLeft:3}},'受発注'):null
                    ),
                    sizes.filter(function(s){return s!=='SSA';}).map(function(s){
                      var v=availD(selLine[0],w,c.v,s,'door');
                      return h('td',{key:s,style:{textAlign:'center',fontWeight:700,color:v<=0?'#DC2626':v<=10?'#D97706':'#065F46'}},v>0?fm(v):'-');
                    }),
                    h('td',{style:{fontSize:8,color:'var(--g500)'}},WH_MAP[w].s),
                    h('td',null,h('button',{className:'btn btn-xs btn-ol',onClick:function(){startEdit('扉 '+c.l,selLine[0],'door',sizes[0],true,c.v);}},'編集'))
                  ));
                }
                if(hasAnyH){
                  rows.push(h('tr',{key:w+'-h-'+c.v},
                    h('td',null,
                      h('span',{style:{display:'inline-block',width:12,height:12,borderRadius:2,background:c.x,verticalAlign:'middle',marginRight:4}}),
                      c.l,' (ホタ)',c.order?h('span',{style:{fontSize:7,color:'#DC2626',marginLeft:3}},'受発注'):null
                    ),
                    sizes.filter(function(s){return s!=='SSA';}).map(function(s){
                      var v=availD(selLine[0],w,c.v,s,'doorH');
                      return h('td',{key:s,style:{textAlign:'center',fontWeight:700,color:v<=0?'#DC2626':v<=10?'#D97706':'#065F46'}},v>0?fm(v):'-');
                    }),
                    h('td',{style:{fontSize:8,color:'var(--g500)'}},WH_MAP[w].s),
                    h('td',null,h('button',{className:'btn btn-xs btn-ol',onClick:function(){startEdit('扉〈ホタ〉'+c.l,selLine[0],'doorH',sizes[0],true,c.v);}},'編集'))
                  ));
                }
              });
            });
            return rows;
          })())
        )
      )
    ),
    /* Edit modal */
    editModal[0]?h(Modal,{show:true,title:'在庫編集: '+editModal[0].label,w:500,onClose:function(){editModal[1](null);},
      footer:h('div',{style:{display:'flex',gap:6}},
        h('button',{className:'btn btn-ol',onClick:function(){editModal[1](null);}},'キャンセル'),
        h('button',{className:'btn btn-gn',onClick:saveEdit},'保存'))},
      h('div',null,
        WH_IDS.filter(function(w){return hasStock(editModal[0].lineId,w);}).map(function(w){
          return h('div',{key:w,style:{display:'flex',gap:8,alignItems:'center',marginBottom:6}},
            h('label',{style:{width:80,fontSize:10,fontWeight:600}},WH_MAP[w].n),
            h('input',{className:'inp',type:'number',min:0,value:editModal[0].vals[w]||0,onChange:function(e){updateEditVal(w,e.target.value);},style:{width:100,textAlign:'right',fontWeight:700}})
          );
        })
      )
    ):null
  );
}

/* ========== RENDER ========== */
ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
