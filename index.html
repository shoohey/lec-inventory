function getIrisu(key,sub){
  var o=IRISU[key];if(!o)return 1;
  if(typeof o==='number')return o;
  if(sub!==undefined&&o[sub])return o[sub];
  return o.sml||o.S||1;
}
function getBoxWt(key,sub){
  var o=BOX_WEIGHT[key];if(!o)return 5;
  if(typeof o==='number')return o;
  if(sub!==undefined&&o[sub])return o[sub];
  return o.sml||o.S||5;
}

function calcShipping(lines,whId,custPref){
  var whReg=WH_MAP[whId].region;
  var custReg=REGION_KEY_MAP[getRegion(custPref)]||'kanto';
  var rate=SR[whReg]&&SR[whReg][custReg]||45;
  /* Build combined BOM for all lines */
  var allBom=[];
  lines.forEach(function(l){
    if(l.isFreeInput)return;/* Free input lines have no BOM for shipping calc */
    var bom;
    if(l.isPartOnly){bom=[];if(l.isDoor){bom.push({key:l.partKey,qty:l.qty,label:l.partLabel,isDoor:true,doorSub:l.partSub});}else if(l.partSub!==undefined){bom.push({key:l.partKey,sub:l.partSub,qty:l.qty,label:l.partLabel});}else{bom.push({key:l.partKey,qty:l.qty,label:l.partLabel});}}
    else{bom=calcBOM(l.size,l.islands,l.tiers,l.lock,l.type,l);}
    allBom=allBom.concat(bom);
  });
  /* Calculate total weight from boxes */
  var tw=0,totalBoxes=0;
  allBom.forEach(function(b){
    var iri,bw;
    if(b.isDoor){
      iri=getIrisu(b.key,b.doorSub||b.sub);bw=getBoxWt(b.key,b.doorSub||b.sub);
    }else if(b.sub!==undefined){
      iri=getIrisu(b.key,b.sub);bw=getBoxWt(b.key,b.sub);
    }else{
      iri=getIrisu(b.key);bw=getBoxWt(b.key);
    }
    var boxes=Math.ceil(b.qty/iri);
    tw+=boxes*bw;totalBoxes+=boxes;
  });
  /* Base board weight is already in BOM via calcBOM when hasBase!==false, so skip separate calculation */
  var base=tw*rate+MISC_FEE;
  var ship=Math.ceil(base*MARKUP);
  if(tw>CHARTER_KG)ship+=CHARTER_FEE;
  return{weight:Math.round(tw*10)/10,rate:rate,shipping:ship,charter:tw>CHARTER_KG,boxes:totalBoxes};
}

var COMMON_STOCK_KEYS=['dialH110','dialH111','dialDST','dial','totte','padlock','cylinder','cylinderMaster','cylinderLongStd','cylinderLongF','cylinderLongB','cylinderShortStd','cylinderShortF','cylinderShortB','cylinderShortC','cylinderExchange','cylinderExchangeSpare','coinReturn','dialH110new','dialH111new','dialH112','dialImon','searchKey','masterKey','dialOpnus','cylinderFMaster','cylinderBMaster','cylinderCMaster','cylinderDMaster','cylinderLMaster','dialKeyH110','dialKeyH111','dialKeyD003','dialKeyD018','padlockGreen','padlockBlack','padlockRed'];
function isCommonStockKey(key){return COMMON_STOCK_KEYS.indexOf(key)>=0;}

  if(isCommonStockKey(key)){
    /* 鍵類は全製品ライン合算 */
    var total=0;
    LINES.forEach(function(ln){
      var s=STK[ln.id]&&STK[ln.id][wh];if(!s)return;
      if(sub!==undefined){var o=s[key];total+=(o&&o[sub])||0;}

}

}

    var total=0;
    LINES.forEach(function(ln){

    bom.push({key:'connector',sub:'XL',qty:n,label:'XLコネクター',reason:n+'台×1'});
    bom.push({key:'hanger',qty:n,label:'ハンガーパイプ',reason:n+'台×1'});
  }
  /* Anchor cap (アンカー穴キャップ): opts.hasCap=true かつベース有の場合のみ。
     v14 A5: 台湾製(tw)・Sα(sa)は対象外。日本製Ver.1/Ver.2のみ自動加算。
     v14.3: 個数はベース(base)と同数 = パーソナルなら n、常設なら islands に戻す */
  if(opts.hasCap===true&&opts.hasBase!==false&&opts.line!=='tw'&&opts.line!=='sa'){
    var capColor=opts.baseColor||'gy';
    var capColorLabel=capColor==='bk'?'ブラック':'グレー';
    var capQty=isPersonal?n:islands;
    bom.push({key:'anchorCap',sub:capColor,qty:capQty,label:'アンカー穴キャップ('+capColorLabel+')',reason:'ベースと同数('+capQty+')',capColor:capColor});
  }
  /* v14 A3/A4: ジョイントネジ・目隠しネジは自動加算を廃止。完全に手動入力(opts.jointScrewQty/opts.capScrewQty)に。
     常設・パーソナル両タイプで手動入力欄から個別に指定する。 */
  if(opts.jointScrewQty){var jq=parseInt(opts.jointScrewQty)||0;if(jq>0)bom.push({key:'jointScrew_'+grp+'_bk',qty:jq,label:'ジョイントネジ('+grp.toUpperCase()+'・ブラック)',reason:'手動入力'});}
  if(opts.capScrewQty){var cq=parseInt(opts.capScrewQty)||0;if(cq>0)bom.push({key:'capScrew_bk',qty:cq,label:'目隠しネジ(ブラック)',reason:'手動入力'});}
  if(opts.capScrewGyQty){var cqg=parseInt(opts.capScrewGyQty)||0;if(cqg>0)bom.push({key:'capScrew_gy',qty:cqg,label:'目隠しネジ(グレー)',reason:'手動入力'});}
  /* Nameplate & name paper: optional */
  if(opts.hasNameplate===true){bom.push({key:'nameplate',qty:n,label:'ネームプレート',reason:n+'台×1'});}
  if(opts.hasNamePaper===true){bom.push({key:'namePaper',qty:n,label:'ネーム厚紙',reason:n+'台×1'});}
  /* Lock: noDoor時は不要。複数色配分でオープン(扉なし)が含まれる場合はその台数分を除外 */
  if(!noDoor&&lock&&lock!=='none'){
    var lockN=n;
    if(opts.colorBreakdown&&opts.colorBreakdown.length>0){
      var openLine=opts.colorBreakdown.find(function(c){return c.color==='open';});
      if(openLine)lockN=Math.max(0,n-(openLine.qty||0));
    }
    if(lockN>0){
      bom.push({key:lock,qty:lockN,label:LOCK_TYPES.find(function(lt){return lt.v===lock;})?LOCK_TYPES.find(function(lt){return lt.v===lock;}).l:'錠前',reason:lockN+'台×1'+(lockN!==n?'（オープン'+(n-lockN)+'台除外）':'')});
    }
  }
  return bom;
}

function checkWH(line,wh,bom,color,size){
  var items=[],ok=true;
  var orderCol=isOrderColor(line,color);
  bom.forEach(function(b){
    var stock,held,free;
    if(b.isDoor){
      if(orderCol){
        items.push({label:b.label,need:b.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var dk=b.key;/* 'door' or 'doorH' */
      stock=gd(line,wh,color,size,dk);held=ghd(line,wh,color,size,dk);free=stock-held;
    }else if(b.sub!==undefined){
      stock=gs(line,wh,b.key,b.sub);held=gh(line,wh,b.key,b.sub);free=stock-held;
    }else{
      stock=gs(line,wh,b.key);held=gh(line,wh,b.key);free=stock-held;
    }
    var pass=free>=b.qty;
    if(!pass)ok=false;
    items.push({label:b.label,need:b.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,b.qty-free)});
  });
  return{ok:ok,items:items};
}

/* v14 A8: 在庫がある分のみ HELD に積み、不足分は未確保リストに記録。
   返り値: 実際に押さえた数を記録した actualHeld[] - releaseBOMActual で正確に戻すために必要(Codex P1対応)
   v14 Codex P1: 鍵類は jp2 バケットへ消費する（物理在庫がjp2に集約されているため） */
function holdBOMPartial(line,wh,bom,color,size,colorBreakdown,unsecuredOut){
  var actualHeld=[];
  bom.forEach(function(b){
    if(b.isDoor){
      var doorColors=colorBreakdown&&colorBreakdown.length>0?colorBreakdown:[{color:color,qty:b.qty}];
      doorColors.forEach(function(dc){
        if(isOrderColor(line,dc.color)||dc.color==='open')return;
        var dk=b.key;
        var free=availD(line,wh,dc.color,size,dk);
        var take=Math.min(Math.max(0,free),dc.qty);
        var short=dc.qty-take;
        if(take>0){
          if(!HELD[line][wh][dk])HELD[line][wh][dk]={};
          if(!HELD[line][wh][dk][dc.color])HELD[line][wh][dk][dc.color]={};
          HELD[line][wh][dk][dc.color][size]=(HELD[line][wh][dk][dc.color][size]||0)+take;
          actualHeld.push({isDoor:true,key:dk,color:dc.color,size:size,qty:take,heldLine:line});
        }
        if(short>0&&unsecuredOut){
          unsecuredOut.push({line:line,wh:wh,key:dk,color:dc.color,size:size,qty:short,label:b.label+(dc.color?' '+dc.color:''),isDoor:true});
        }
      });
    }else if(b.sub!==undefined){
      var holdLine=normalizeStockLine(line,b.key);
      var free2=avail(holdLine,wh,b.key,b.sub);
      var take2=Math.min(Math.max(0,free2),b.qty);
      var short2=b.qty-take2;
      if(take2>0){
        if(!HELD[holdLine])HELD[holdLine]={};
        if(!HELD[holdLine][wh])HELD[holdLine][wh]={door:{},doorH:{}};
        if(!HELD[holdLine][wh][b.key])HELD[holdLine][wh][b.key]={};
        HELD[holdLine][wh][b.key][b.sub]=(HELD[holdLine][wh][b.key][b.sub]||0)+take2;
        actualHeld.push({isDoor:false,key:b.key,sub:b.sub,qty:take2,heldLine:holdLine});
      }
      if(short2>0&&unsecuredOut){
        unsecuredOut.push({line:line,wh:wh,key:b.key,sub:b.sub,qty:short2,label:b.label,isDoor:false});
      }
    }else{
      var holdLine2=normalizeStockLine(line,b.key);
      var free3=avail(holdLine2,wh,b.key);
      var take3=Math.min(Math.max(0,free3),b.qty);
      var short3=b.qty-take3;
      if(take3>0){
        if(!HELD[holdLine2])HELD[holdLine2]={};
        if(!HELD[holdLine2][wh])HELD[holdLine2][wh]={door:{},doorH:{}};
        HELD[holdLine2][wh][b.key]=(HELD[holdLine2][wh][b.key]||0)+take3;
        actualHeld.push({isDoor:false,key:b.key,qty:take3,heldLine:holdLine2});
      }
      if(short3>0&&unsecuredOut){
        unsecuredOut.push({line:line,wh:wh,key:b.key,qty:short3,label:b.label,isDoor:false});
      }
    }
  });
  return actualHeld;
}
/* v14: actualHeld 配列から実際に押さえた分のみを戻す。partial hold で確実にロールバックするために必要。
   各要素の heldLine を尊重して、鍵類はjp2バケットから戻す */
function releaseActualHeld(line,wh,actualHeld){
  if(!actualHeld||!actualHeld.length)return;
  actualHeld.forEach(function(b){
    var ln=b.heldLine||line;
    /* v14.2 Codex P1対応: マルチ倉庫案件では actualHeld の各エントリに _wh が記録されているため優先する */
    var releaseWh=b._wh||wh;
    if(b.isDoor){
      if(HELD[ln]&&HELD[ln][releaseWh]&&HELD[ln][releaseWh][b.key]&&HELD[ln][releaseWh][b.key][b.color]){
        HELD[ln][releaseWh][b.key][b.color][b.size]=Math.max(0,(HELD[ln][releaseWh][b.key][b.color][b.size]||0)-b.qty);
      }
    }else if(b.sub!==undefined){
      if(HELD[ln]&&HELD[ln][releaseWh]&&HELD[ln][releaseWh][b.key]){
        HELD[ln][releaseWh][b.key][b.sub]=Math.max(0,(HELD[ln][releaseWh][b.key][b.sub]||0)-b.qty);
      }
    }else{
      if(HELD[ln]&&HELD[ln][releaseWh]){
        HELD[ln][releaseWh][b.key]=Math.max(0,(HELD[ln][releaseWh][b.key]||0)-b.qty);
      }
    }
  });
}

/* v14 Codex P1対応: 鍵類は物理在庫がjp2に集約されているため、消費先ラインを正規化 */
function normalizeStockLine(line,key){
  if(isCommonStockKey(key))return 'jp2';
  return line;
}
/* v14: ラッパー - 呼び出し元が ln._actualHeld を持つ場合はそちらを優先（Codex P1対応）
   v14.2: マルチ倉庫案件では actualHeld の _wh が wh と一致するエントリのみ解放
   v14.3 Codex P1対応: actualHeld 追跡が一度でも記録されたラインは _hadActualHeld フラグで永続的にマーク。
   部分解放で配列が空になっても BOM 全量解放 fallback を抑止し、他案件の HELD を巻き込まない */
function releaseLine(ln,wh){
  if(ln.isFreeInput)return;
  if(ln._actualHeld&&ln._actualHeld.length>0){
    /* 該当倉庫のエントリのみフィルタ。_heldWh===wh または _wh===wh が条件 */
    var matchingEntries=ln._actualHeld.filter(function(b){
      if(b._wh)return b._wh===wh;
      return ln._heldWh===wh;
    });
    if(matchingEntries.length>0){
      releaseActualHeld(ln.line,wh,matchingEntries);
      /* 解放したエントリを _actualHeld から削除 */
      ln._actualHeld=ln._actualHeld.filter(function(b){return matchingEntries.indexOf(b)<0;});
      ln._hadActualHeld=true;/* フラグ保持 */
      return;
    }
    if(ln._heldWh===wh){
      /* マッチが無いが _heldWh==wh の場合は全解放（後方互換: 旧データ） */
      releaseActualHeld(ln.line,wh,ln._actualHeld);
      ln._actualHeld=[];
      ln._hadActualHeld=true;
      return;
    }
  }
  /* v14.3: 過去にactualHeldを持っていたラインはfallbackで全BOM解放しない（部分解放後の空配列対策） */
  if(ln._hadActualHeld)return;
  /* 後方互換: actualHeld 未記録の旧データは bom 全量で戻す（v13以前互換） */
  var bom;
  if(ln.isPartOnly){
    bom=[];
    if(ln.isDoor){bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}
    else if(ln.partSub!==undefined){bom.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
    else{bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
  }else{bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
  releaseBOM(ln.line,wh,bom,ln.color,ln.size,ln.colorBreakdown);
}

          }
          if(takeB>0&&STK[ln.line]&&STK[ln.line][whB]&&STK[ln.line][whB][dk]&&STK[ln.line][whB][dk][dc.color]){
            var sB0=STK[ln.line][whB][dk][dc.color][ln.size]||0;
            var nVB=Math.max(0,sB0-takeB);
            STK[ln.line][whB][dk][dc.color][ln.size]=nVB;
            EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:ln.line,key:dk,sub:ln.size,color:dc.color,wh:whB,oldVal:sB0,newVal:nVB,label:'扉('+dc.color+' '+ln.size+')出荷消費 '+order.no,editor:'出荷処理'});
          }
        });
      }else if(b.sub!==undefined){
        /* v14 Codex P1: 鍵類はjp2バケットから消費 */
        var sl=normalizeStockLine(ln.line,b.key);
        var sA2=(STK[sl]&&STK[sl][whA]&&STK[sl][whA][b.key]&&STK[sl][whA][b.key][b.sub])||0;
        var tA2=Math.min(sA2,b.qty),tB2=b.qty-tA2;
        if(tA2>0){
          var nVA2=Math.max(0,sA2-tA2);
          STK[sl][whA][b.key][b.sub]=nVA2;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:sl,key:b.key,sub:b.sub,wh:whA,oldVal:sA2,newVal:nVA2,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
        if(tB2>0&&STK[sl]&&STK[sl][whB]&&STK[sl][whB][b.key]){
          var sB1=STK[sl][whB][b.key][b.sub]||0;
          var nVB1=Math.max(0,sB1-tB2);
          STK[sl][whB][b.key][b.sub]=nVB1;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:sl,key:b.key,sub:b.sub,wh:whB,oldVal:sB1,newVal:nVB1,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
      }else{
        var sl2=normalizeStockLine(ln.line,b.key);
        var sA3=(STK[sl2]&&STK[sl2][whA]&&STK[sl2][whA][b.key])||0;
        var tA3=Math.min(sA3,b.qty),tB3=b.qty-tA3;
        if(tA3>0){
          var nVA3=Math.max(0,sA3-tA3);
          STK[sl2][whA][b.key]=nVA3;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:sl2,key:b.key,wh:whA,oldVal:sA3,newVal:nVA3,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
        if(tB3>0&&STK[sl2]&&STK[sl2][whB]){
          var sB2=STK[sl2][whB][b.key]||0;
          var nVB2=Math.max(0,sB2-tB3);
          STK[sl2][whB][b.key]=nVB2;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:sl2,key:b.key,wh:whB,oldVal:sB2,newVal:nVB2,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
      }
    });
    /* v14.3 Codex P2対応: 他案件のHELDを巻き込まないよう、本案件の _actualHeld を介して解放
       releaseLine は _wh ごとに正確に該当HELDを引くため、shipOrderMulti でも安全 */
    releaseLine(ln,whA);
    releaseLine(ln,whB);
  });
}

function shipOrder(order){
  /* v14.2 Codex P1/P2対応: 部分解放履歴を BOM から差し引いてから STK 消費
     扉は色別(colorBreakdown)で消費されるため、扉のキーには「色」も含めて突合する
     ラインID(line)も含めることで同じキーが複数ラインにまたがる場合の混線を防ぐ */
  var pr=order._partialReleases||[];
  var prSub={};/* line|key|sub -> released qty */
  var prDoor={};/* line|key|color|size -> released qty（色別） */
  pr.forEach(function(r){
    var ln_=r.line||'_';
    if(r.isDoor){
      var k=ln_+'|'+r.key+'|'+(r.color||'')+'|'+(r.doorSub||'');
      prDoor[k]=(prDoor[k]||0)+r.released;
    }else{
      var k2=ln_+'|'+r.key+'|'+(r.sub||'');
      prSub[k2]=(prSub[k2]||0)+r.released;
    }
  });
  order.lines.forEach(function(ln){
    if(ln.isFreeInput)return;
    /* v14.3 Codex P2対応: 出荷後の出荷Excel BOM表示用に _actualHeld をスナップショット保存 */
    if(ln._actualHeld&&ln._actualHeld.length>0){
      ln._shippedActualHeld=ln._actualHeld.map(function(ah){return Object.assign({},ah);});
    }
    var bom;
    if(ln.isPartOnly){
      bom=[];
      if(ln.isDoor){bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}
      else if(ln.partSub!==undefined){bom.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
      else{bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
    }else{bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
    /* 部分解放分を BOM から差し引く（非扉部材） - ラインIDキー */
    bom.forEach(function(b){
      if(b.isDoor)return;/* 扉は後段で色別に処理 */
      if(b.sub!==undefined){
        var pk2=ln.line+'|'+b.key+'|'+(b.sub||'');
        if(prSub[pk2]>0){var d2=Math.min(b.qty,prSub[pk2]);b.qty-=d2;prSub[pk2]-=d2;}
      }else{
        var pk3=ln.line+'|'+b.key+'|';
        if(prSub[pk3]>0){var d3=Math.min(b.qty,prSub[pk3]);b.qty-=d3;prSub[pk3]-=d3;}
      }
    });
    bom=bom.filter(function(b){return b.isDoor||b.qty>0;});
    var orderCol=isOrderColor(ln.line,ln.color);
    bom.forEach(function(b){
      if(b.isDoor){
        /* 扉: colorBreakdown を ディープコピーし、色別に部分解放を反映してから STK 消費 */
        var origBd=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
        var doorColors3=origBd.map(function(c){return{color:c.color,qty:c.qty};});
        doorColors3.forEach(function(dc){
          var pk=ln.line+'|'+b.key+'|'+(dc.color||'')+'|'+(b.doorSub||ln.size||'');
          if(prDoor[pk]>0){
            var dd=Math.min(dc.qty,prDoor[pk]);
            dc.qty-=dd;prDoor[pk]-=dd;
          }
        });
        doorColors3.forEach(function(dc){
          if(dc.qty<=0)return;
          if(isOrderColor(ln.line,dc.color)||dc.color==='open')return;
          var dk=b.key;
          if(STK[ln.line]&&STK[ln.line][order.wh]&&STK[ln.line][order.wh][dk]&&STK[ln.line][order.wh][dk][dc.color]){
            var oldV=STK[ln.line][order.wh][dk][dc.color][ln.size]||0;
            var newV=Math.max(0,oldV-dc.qty);
            STK[ln.line][order.wh][dk][dc.color][ln.size]=newV;
            /* v14.2 Codex P2対応: 出荷分を EDIT_LOG に記録（過去日付スナップショット用） */
            EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:ln.line,key:dk,sub:ln.size,color:dc.color,wh:order.wh,oldVal:oldV,newVal:newV,label:'扉('+dc.color+' '+ln.size+')出荷消費 '+order.no,editor:'出荷処理'});
          }
        });
      }else if(b.sub!==undefined){
        /* v14 Codex P1: 鍵類はjp2バケットから消費 */
        var shipLine=normalizeStockLine(ln.line,b.key);
        if(STK[shipLine]&&STK[shipLine][order.wh]&&STK[shipLine][order.wh][b.key]){
          var oV1=STK[shipLine][order.wh][b.key][b.sub]||0;
          var nV1=Math.max(0,oV1-b.qty);
          STK[shipLine][order.wh][b.key][b.sub]=nV1;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:shipLine,key:b.key,sub:b.sub,wh:order.wh,oldVal:oV1,newVal:nV1,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
      }else{
        var shipLine2=normalizeStockLine(ln.line,b.key);
        if(STK[shipLine2]&&STK[shipLine2][order.wh]){
          var oV2=STK[shipLine2][order.wh][b.key]||0;
          var nV2=Math.max(0,oV2-b.qty);
          STK[shipLine2][order.wh][b.key]=nV2;
          EDIT_LOG.push({timestamp:new Date().toLocaleString('ja-JP'),lineId:shipLine2,key:b.key,wh:order.wh,oldVal:oV2,newVal:nV2,label:(b.label||b.key)+'出荷消費 '+order.no,editor:'出荷処理'});
        }
      }
    });
    /* v14: releaseLine で actualHeld 優先解放（partial hold対応） */
    releaseLine(ln,order.wh);
  });
}

/* ========== CHECK ALL LINES AT WAREHOUSE ========== */
function checkAllLinesWH(lines,wh){
  var allOk=true,allItems=[];
  /* Group lines by product line (jp01, jp2, tw, sa) since they use separate inventory pools */
  var byLine={};
  lines.forEach(function(ln){
    if(!byLine[ln.line])byLine[ln.line]=[];
    byLine[ln.line].push(ln);
  });
  Object.keys(byLine).forEach(function(lineId){
    var group=byLine[lineId];
    /* Check if this product line exists at the warehouse */
    if(!hasStock(lineId,wh)){
      allOk=false;
      allItems.push({label:'製品ライン「'+(LINES.find(function(l){return l.id===lineId;})||{}).name+'」取扱なし',need:0,stock:0,held:0,free:0,ok:false,shortage:0});
      return;
    }
    /* Aggregate BOM quantities across all order lines in this product line group */
    var structAgg={};/* key: "key|sub" -> {qty, label, key, sub} */
    var doorAgg={};/* key: "doorKey|color|size" -> {qty, label, doorKey, color, size} */
    var simpleAgg={};/* key: "key" -> {qty, label, key} */
    group.forEach(function(ln){
      if(ln.isFreeInput)return;/* Free input lines have no inventory to check */
      var bom;
      if(ln.isPartOnly){
        bom=[];
        if(ln.isDoor){bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}
        else if(ln.partSub!==undefined){bom.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
        else{bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
      }else{bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
      var orderCol=isOrderColor(lineId,ln.color);
      var colorName_=(LINE_COLORS[lineId]||[]).find(function(cc){return cc.v===ln.color;});
      var cLabel=colorName_?(' '+colorName_.l):'';
      bom.forEach(function(b){
        if(b.isDoor){
          /* E7: multi-color support */
          var doorColors=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
          doorColors.forEach(function(dc){
            if(dc.color==='open')return;/* オープン(扉なし)は扉在庫を消費しない */
            var oc2=isOrderColor(lineId,dc.color);
            var cn2=(LINE_COLORS[lineId]||[]).find(function(cc){return cc.v===dc.color;});
            var cl2=cn2?(' '+cn2.l):'';
            if(oc2){
              var oKey='order|'+b.key+'|'+dc.color+'|'+ln.size;
              if(!doorAgg[oKey])doorAgg[oKey]={qty:0,label:b.label+cl2,doorKey:b.key,color:dc.color,size:ln.size,isOrder:true};
              doorAgg[oKey].qty+=dc.qty;
            }else{
              var dKey=b.key+'|'+dc.color+'|'+ln.size;
              if(!doorAgg[dKey])doorAgg[dKey]={qty:0,label:b.label+cl2,doorKey:b.key,color:dc.color,size:ln.size,isOrder:false};
              doorAgg[dKey].qty+=dc.qty;
            }
          });
        }else if(b.sub!==undefined){
          var sKey=b.key+'|'+b.sub;
          if(!structAgg[sKey])structAgg[sKey]={qty:0,label:b.label,key:b.key,sub:b.sub};
          structAgg[sKey].qty+=b.qty;
        }else{
          if(!simpleAgg[b.key])simpleAgg[b.key]={qty:0,label:b.label,key:b.key};
          simpleAgg[b.key].qty+=b.qty;
        }
      });
    });
    /* Check aggregated structural parts */
    Object.keys(structAgg).forEach(function(k){
      var a=structAgg[k];
      var stock=gs(lineId,wh,a.key,a.sub);
      var held=gh(lineId,wh,a.key,a.sub);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated doors */
    Object.keys(doorAgg).forEach(function(k){
      var a=doorAgg[k];
      if(a.isOrder){
        allItems.push({label:a.label,need:a.qty,stock:0,held:0,free:0,ok:true,orderItem:true,shortage:0});
        return;
      }
      var stock=gd(lineId,wh,a.color,a.size,a.doorKey);
      var held=ghd(lineId,wh,a.color,a.size,a.doorKey);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    /* Check aggregated simple parts */
    Object.keys(simpleAgg).forEach(function(k){
      var a=simpleAgg[k];
      /* v14 Codex P2対応: 共通在庫キーはここでスキップ、後で全ライン合算で集約チェック */
      if(isCommonStockKey(a.key)){
        if(!allItems._commonAgg)allItems._commonAgg={};
        if(!allItems._commonAgg[a.key])allItems._commonAgg[a.key]={qty:0,label:a.label,key:a.key};
        allItems._commonAgg[a.key].qty+=a.qty;
        return;
      }
      var stock=gs(lineId,wh,a.key);
      var held=gh(lineId,wh,a.key);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label,need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
  });
  /* v14 Codex P2対応: 共通在庫キーの全ライン合算チェック（鍵類は全製品ラインで共有プール） */
  if(allItems._commonAgg){
    Object.keys(allItems._commonAgg).forEach(function(k){
      var a=allItems._commonAgg[k];
      /* gs(jp2,wh,key) は鍵類で全ライン合算プール値を返す */
      var stock=gs('jp2',wh,a.key);
      var held=gh('jp2',wh,a.key);
      var free=stock-held;
      var pass=free>=a.qty;
      if(!pass)allOk=false;
      allItems.push({label:a.label+'（共通プール）',need:a.qty,stock:stock,held:held,free:free,ok:pass,shortage:Math.max(0,a.qty-free)});
    });
    delete allItems._commonAgg;
  }
  return{ok:allOk,items:allItems};
}

/* Ensures every LINE has every WH_ID populated with a base structure.
   Also splits jointScrew / capScrew into color-aware flat keys so the
   "ジョイントネジ SMLXL黒 / SS黒 / SSグレー" rows track separately. */
(function migrateStock(){
  try{
    var REQUIRED_WH=WH_IDS;
    LINES.forEach(function(ln){
      if(!STK[ln.id])STK[ln.id]={};
      if(!HELD[ln.id])HELD[ln.id]={};
      REQUIRED_WH.forEach(function(w){
        if(!STK[ln.id][w]){
          /* Create a zeroed shell so 在庫確認 / 部材一覧 が表示できる */
          STK[ln.id][w]={
            top:{sml:0,ss:0},base:{sml:0,ss:0},base_bk:{sml:0,ss:0},shelf:{sml:0,ss:0},shelf_bk:{sml:0,ss:0},
            side:{S:0,M:0,L:0,XL:0,SS:0,'3S':0},back:{S:0,M:0,L:0,XL:0,SS:0,'3S':0},
            vj:{sml:0,ss:0},sj:{sml:0,ss:0},
            handle:0,dial:0,padlock:0,cylinder:0,coinReturn:0,dialH110:0,dialH111:0,dialDST:0,totte:0,cylinderMaster:0,
            nameplate:0,namePaper:0,hanger:0,connector:{XL:0,SS:0},
            anchorCap:{bk:0,gy:0},
            door:{},doorH:{}
          };
        }
        var s=STK[ln.id][w];
        /* anchorCap: ensure object form with bk/gy */
        if(typeof s.anchorCap==='number'){var ov=s.anchorCap;s.anchorCap={bk:0,gy:ov};}
        if(!s.anchorCap||typeof s.anchorCap!=='object')s.anchorCap={bk:0,gy:0};
        if(typeof s.anchorCap.bk!=='number')s.anchorCap.bk=parseInt(s.anchorCap.bk)||0;
        if(typeof s.anchorCap.gy!=='number')s.anchorCap.gy=parseInt(s.anchorCap.gy)||0;
        /* jointScrew: split {sml,ss} or number → 3 flat keys */
        var oldJs=s.jointScrew;
        if(typeof s.jointScrew_sml_bk==='undefined')s.jointScrew_sml_bk=oldJs&&typeof oldJs==='object'?(parseInt(oldJs.sml)||0):(parseInt(oldJs)||0);
        if(typeof s.jointScrew_ss_bk==='undefined')s.jointScrew_ss_bk=oldJs&&typeof oldJs==='object'?(parseInt(oldJs.ss)||0):0;
        if(typeof s.jointScrew_ss_gy==='undefined')s.jointScrew_ss_gy=0;
        delete s.jointScrew;
        /* capScrew: split {sml,ss} or number → 2 flat keys (bk/gy) */
        var oldCs=s.capScrew;
        if(typeof s.capScrew_bk==='undefined')s.capScrew_bk=oldCs&&typeof oldCs==='object'?((parseInt(oldCs.sml)||0)+(parseInt(oldCs.ss)||0)):(parseInt(oldCs)||0);
        if(typeof s.capScrew_gy==='undefined')s.capScrew_gy=0;
        delete s.capScrew;
        /* Door colors: ensure all expected colors exist as objects */
        if(!s.door||typeof s.door!=='object')s.door={};
        if(!s.doorH||typeof s.doorH!=='object')s.doorH={};
        /* HELD shell */
        if(!HELD[ln.id][w])HELD[ln.id][w]={door:{},doorH:{}};
        /* Migrate HELD jointScrew/capScrew the same way */
        var hh=HELD[ln.id][w];var oldHJ=hh.jointScrew;
        if(typeof hh.jointScrew_sml_bk==='undefined')hh.jointScrew_sml_bk=oldHJ&&typeof oldHJ==='object'?(parseInt(oldHJ.sml)||0):(parseInt(oldHJ)||0);
        if(typeof hh.jointScrew_ss_bk==='undefined')hh.jointScrew_ss_bk=oldHJ&&typeof oldHJ==='object'?(parseInt(oldHJ.ss)||0):0;
        if(typeof hh.jointScrew_ss_gy==='undefined')hh.jointScrew_ss_gy=0;
        delete hh.jointScrew;
        var oldHC=hh.capScrew;
        if(typeof hh.capScrew_bk==='undefined')hh.capScrew_bk=oldHC&&typeof oldHC==='object'?((parseInt(oldHC.sml)||0)+(parseInt(oldHC.ss)||0)):(parseInt(oldHC)||0);
        if(typeof hh.capScrew_gy==='undefined')hh.capScrew_gy=0;
        delete hh.capScrew;
        /* v14 C21: 新規部材21種類の初期化 */
        var V14_NEW_KEYS=['dialOpnus','cylinderFMaster','cylinderBMaster','cylinderCMaster','cylinderDMaster','cylinderLMaster','dialKeyH110','dialKeyH111','dialKeyD003','dialKeyD018','doorPocket','topJoint','hingeCoverSML','hingeCoverSS','namePlateCoverSML','namePlateCoverSS','namePlatePaper','padlockGreen','padlockBlack','padlockRed'];
        V14_NEW_KEYS.forEach(function(k){
          if(typeof s[k]==='undefined')s[k]=0;
          if(typeof hh[k]==='undefined')hh[k]=0;
        });
      });
      /* v14 Codex P1対応: 鍵類の物理在庫を jp2 のバケットに集約。
         他ラインのバケットに残存する鍵在庫を全て jp2 倉庫合算へ移し、消費と物理の不整合を防ぐ。 */
      if(ln.id!=='jp2'){
        REQUIRED_WH.forEach(function(w){
          var src=STK[ln.id]&&STK[ln.id][w];if(!src)return;
          if(!STK.jp2)STK.jp2={};if(!STK.jp2[w])STK.jp2[w]={};
          var dst=STK.jp2[w];
          COMMON_STOCK_KEYS.forEach(function(k){
            if(typeof src[k]==='number'&&src[k]>0){
              dst[k]=(parseInt(dst[k])||0)+parseInt(src[k]);
              src[k]=0;
            }
          });
          /* HELD も同様にjp2に統合 */
          var hsrc=HELD[ln.id]&&HELD[ln.id][w];if(hsrc){
            if(!HELD.jp2)HELD.jp2={};if(!HELD.jp2[w])HELD.jp2[w]={};
            var hdst=HELD.jp2[w];
            COMMON_STOCK_KEYS.forEach(function(k){
              if(typeof hsrc[k]==='number'&&hsrc[k]>0){
                hdst[k]=(parseInt(hdst[k])||0)+parseInt(hsrc[k]);
                hsrc[k]=0;
              }
            });
          }
        });
      }
    });
    saveStock();saveHeld();
  }catch(e){console.warn('Stock migration failed',e);}
})();

function fm(n){if(n===null||n===undefined||n==='')return '';if(typeof n==='number'){if(isNaN(n))return '0';return n.toLocaleString();}var num=parseInt(n);if(isNaN(num))return String(n);return num.toLocaleString();}
function td(){var d=new Date();return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function td2(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function tdSlash(){var d=new Date();return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}

      }
      /* 扉は色別に展開、非扉はそのまま。部分解放を差し引く */
      var expandedB=[];
      bom.forEach(function(b){
        if(b.isDoor){
          var origBd=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
          origBd.forEach(function(dc){
            if(dc.qty<=0)return;
            expandedB.push({key:b.key,qty:dc.qty,label:b.label,isDoor:true,doorSub:b.doorSub||ln.size,color:dc.color});
          });
        }else{
          expandedB.push({key:b.key,sub:b.sub,qty:b.qty,label:b.label,isDoor:false});
        }
      });
      var co2_=(LINE_COLORS[ln.line]||[]).find(function(c){return c.v===ln.color;});
      expandedB.forEach(function(b){
        /* 部分解放を差し引く */
        var releasedNote='';
        if(b.isDoor){
          var pk=ln.line+'|'+b.key+'|'+(b.color||'')+'|'+(b.doorSub||'');
          if(prDoorH[pk]>0){var d=Math.min(b.qty,prDoorH[pk]);b.qty-=d;prDoorH[pk]-=d;releasedNote=' (部分解放 -'+d+')';}
        }else if(b.sub!==undefined){
          var pk2=ln.line+'|'+b.key+'|'+(b.sub||'');
          if(prSubH[pk2]>0){var dd=Math.min(b.qty,prSubH[pk2]);b.qty-=dd;prSubH[pk2]-=dd;releasedNote=' (部分解放 -'+dd+')';}
        }else{
          var pk3=ln.line+'|'+b.key+'|';
          if(prSubH[pk3]>0){var ddd=Math.min(b.qty,prSubH[pk3]);b.qty-=ddd;prSubH[pk3]-=ddd;releasedNote=' (部分解放 -'+ddd+')';}
        }
        if(b.qty<=0)return;
        var lbl=b.label;
        if(b.isDoor){
          var cObj=(LINE_COLORS[ln.line]||[]).find(function(c){return c.v===b.color;});
          if(cObj)lbl+=' '+cObj.l;
        }
        html+='<tr><td>'+lbl+releasedNote+'</td><td class="c">'+b.qty+'</td></tr>';
      });
    });
    html+='</tbody></table>';
  }
  if(!isReceipt&&!isShipping){
    html+='<div class="tot-box">';
    html+='<div class="trow"><span>税抜合計</span><span>&yen;'+fm(subtotal)+'</span></div>';

  html+='<div style="margin-top:16px;font-size:9px;color:#444;line-height:2;border-top:1px solid #ccc;padding-top:8px">';

/* ========== EXCEL GENERATION (SheetJS) ========== */
function generateExcel(order,docType){
  if(typeof XLSX==='undefined'){alert('SheetJS未読込');return;}

    delivery:{title:'納品書',amountLabel:'納品金額（税込）',slipPrefix:'納品',dateLabel:'納品日',sheet:'納品書'},

  var wb=XLSX.utils.book_new();
  var wsData=[];
  wsData.push([cfg.title]);
  wsData.push([]);
  wsData.push(['顧客名',cust?cust.name+' 御中':'','','株式会社LEC']);
  wsData.push(['〒',cust&&cust.postal?cust.postal:'','顧客コード',cust?cust.id:'','','〒120-0005 東京都足立区綾瀬7-4-1']);
  wsData.push(['住所',cust?cust.pref+(cust.city||''):'','','','','TEL. 03-5849-5563  FAX. 03-5849-5564']);
  var exSalesP=order.salesPersonOverride||(cust&&cust.salesPerson?cust.salesPerson:'')||'齋藤 勝';
  var exPayTerms=order.paymentTerms||'前払い（銀行振り込み）';
  wsData.push(['電話番号',cust&&cust.phone?cust.phone:'','FAX番号',cust&&cust.fax?cust.fax:'','','登録番号:T4040001077220  担当者: '+exSalesP]);
  if(cust&&cust.contactPerson)wsData.push(['ご担当',cust.contactPerson+' 様']);
  wsData.push([]);
  wsData.push(['件名',q.subject,'','担当者',exSalesP]);
  wsData.push([cfg.dateLabel,tdSlash(),'','伝票コード',q.slipCode]);
  if(docType==='quote'){
    wsData.push(['納期','別途相談','','有効期限','御見積後1ヶ月']);
  }
  wsData.push(['受渡地',cust?cust.pref+(cust.city||''):'','','支払条件',exPayTerms]);
  wsData.push([]);
  if(!isReceipt){wsData.push([cfg.amountLabel,q.total]);wsData.push([]);}
  if(isReceipt){
    wsData.push(['商品コード','商品名称','数量','単位','備考']);
    q.rows.forEach(function(r){
      if(r.configNote){wsData.push(['',r.configNote,'','','']);}
      wsData.push([r.code,r.name,r.qty,r.unit,'']);
    });
  }else{
    wsData.push(['商品コード','商品名称','数量','単位','単価','金額','税','備考']);
    q.rows.forEach(function(r){
      if(r.configNote){wsData.push(['',r.configNote,'','','','','','']);}
      wsData.push([r.code,r.name,r.qty,r.unit,r.price===''?'':r.price,r.amount,r.tax||'','']);
    });
  }
  wsData.push([]);
  if(!isReceipt){
    wsData.push(['','','','','税抜合計',q.subtotal]);
    wsData.push(['','','','','消費税額',q.tax]);
    wsData.push(['','','','','税込合計',q.total]);
    wsData.push([]);
    wsData.push(['','','','','10%対象',q.subtotal,'(税)',q.tax]);
    wsData.push(['','','','','8%軽減対',0,'(税)',0]);
    wsData.push(['','','','','非課税対象',0]);
  }
  wsData.push([]);
  if(docType==='invoice'){
    wsData.push(['お振込手数料はお客様にてご負担ください。']);
    wsData.push(['振込先: 商工組合中央金庫 上野支店 普通 1300806 カ)レック']);
  }else if(docType==='quote'){
    wsData.push(['支払条件: '+exPayTerms]);
    wsData.push(['有効期限: 御見積後1ヶ月']);
    wsData.push(['振込先: 商工組合中央金庫 上野支店 普通 1300806 カ)レック']);
  }
  if(order.notes){wsData.push([]);wsData.push(['備考: '+order.notes]);}
  if(order.productNotes){var pn=typeof order.productNotes==='string'?order.productNotes:String(order.productNotes||'');wsData.push([]);wsData.push(['商品備考: '+pn]);}
  var ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:14},{wch:42},{wch:8},{wch:8},{wch:12},{wch:14},{wch:8},{wch:20}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws,cfg.sheet);
  /* v14.2 Codex P2対応: 出荷指示書には BOM/部材一覧シートを追加（倉庫作業者向け） */
  if(docType==='shipping'){
    var bomData=[['【出荷指示書 — 部材一覧】 案件: '+order.no+' / 出力日: '+td2()],[],['製品ライン','部材','サイズ/色','数量','倉庫','備考']];
    /* v14.2 Codex P2対応: 出荷Excel BOMでも _partialReleases のラインID で突合 */
    var prSubE={},prDoorE={};
    (order._partialReleases||[]).forEach(function(r){
      var ln_=r.line||'_';
      if(r.isDoor){var kk=ln_+'|'+r.key+'|'+(r.color||'')+'|'+(r.doorSub||'');prDoorE[kk]=(prDoorE[kk]||0)+r.released;}
      else{var k2=ln_+'|'+r.key+'|'+(r.sub||'');prSubE[k2]=(prSubE[k2]||0)+r.released;}
    });
    /* v14.2 Codex P2対応: マルチ倉庫(order.wh2)の場合は _actualHeld の _heldWh から正しい倉庫を引く */
    order.lines.forEach(function(ln){
      if(ln.isFreeInput){bomData.push(['',ln.name||'[自由入力]','',ln.qty,WH_MAP[order.wh]?WH_MAP[order.wh].n:order.wh,ln.unit||'個']);return;}
      var lnObj=LINES.find(function(l){return l.id===ln.line;});
      var lineName=lnObj?lnObj.name:'';
      var lineWh=ln._heldWh||order.wh;/* このラインが押さえた倉庫 */
      var bomLn;
      if(ln.isPartOnly){
        bomLn=[];
        if(ln.isDoor){bomLn.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub,color:ln.color});}
        else if(ln.partSub!==undefined){bomLn.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
        else{bomLn.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
      }else{bomLn=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
      /* v14.2 Codex P2対応: 扉は colorBreakdown を展開して色別に行を分割 */
      var expanded=[];
      bomLn.forEach(function(b){
        if(b.isDoor){
          var origBd=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
          origBd.forEach(function(dc){
            if(dc.qty<=0)return;
            expanded.push({key:b.key,qty:dc.qty,label:b.label,isDoor:true,doorSub:b.doorSub||ln.size,color:dc.color,reason:b.reason||''});
          });
        }else{
          expanded.push({key:b.key,sub:b.sub,qty:b.qty,label:b.label,isDoor:false,reason:b.reason||''});
        }
      });
      expanded.forEach(function(b){
        /* 部分解放分を差し引いて表示（ラインIDで突合） */
        var releasedNote='';
        if(b.isDoor){
          var pk=ln.line+'|'+b.key+'|'+(b.color||'')+'|'+(b.doorSub||'');
          if(prDoorE[pk]>0){var d=Math.min(b.qty,prDoorE[pk]);b.qty-=d;prDoorE[pk]-=d;releasedNote=' (部分解放 -'+d+')';}
        }else if(b.sub!==undefined){
          var pk2=ln.line+'|'+b.key+'|'+(b.sub||'');
          if(prSubE[pk2]>0){var dd=Math.min(b.qty,prSubE[pk2]);b.qty-=dd;prSubE[pk2]-=dd;releasedNote=' (部分解放 -'+dd+')';}
        }else{
          var pk3=ln.line+'|'+b.key+'|';
          if(prSubE[pk3]>0){var ddd=Math.min(b.qty,prSubE[pk3]);b.qty-=ddd;prSubE[pk3]-=ddd;releasedNote=' (部分解放 -'+ddd+')';}
        }
        if(b.qty<=0)return;
        var lbl=b.label||partLabelJP(b.key,b.sub,b.isDoor?b.color:null,b.isDoor);
        var sub=b.isDoor?(b.doorSub||''):(b.sub||'');
        /* v14.2/14.3 Codex P2対応: マルチ倉庫案件は ln._actualHeld（本案件のみ）から倉庫別分配を引く
           グローバルHELDを使うと他案件の押さえ分まで含まれて誤分配するため
           出荷後は _shippedActualHeld（出荷前のスナップショット）をフォールバックとして使う */
        if(order.wh2){
          var whA=order.wh,whB=order.wh2;
          var heldA=0,heldB=0;
          var heldSrc=(ln._actualHeld&&ln._actualHeld.length>0)?ln._actualHeld:(ln._shippedActualHeld||[]);
          heldSrc.forEach(function(ah){
            if(ah.key!==b.key)return;
            if(b.isDoor){if(!ah.isDoor||ah.color!==b.color||ah.size!==b.doorSub)return;}
            else if(b.sub!==undefined){if(ah.sub!==b.sub)return;}
            var wOf=ah._wh||ln._heldWh||whA;/* actualHeldにwh記録がない場合は ln._heldWh をフォールバック */
            if(wOf===whA)heldA+=ah.qty;
            else if(wOf===whB)heldB+=ah.qty;
          });
          var totalH=heldA+heldB;
          if(totalH>0){
            var qA=Math.round(b.qty*(heldA/totalH));
            var qB=b.qty-qA;
            if(qA>0)bomData.push([lineName,lbl,sub,qA,WH_MAP[whA]?WH_MAP[whA].n:whA,(b.reason||'')+releasedNote]);
            if(qB>0)bomData.push([lineName,lbl,sub,qB,WH_MAP[whB]?WH_MAP[whB].n:whB,(b.reason||'')+releasedNote]);
            return;
          }
          /* _actualHeld が記録されていない場合は両倉庫を併記してwarehouseに「+ 倉庫B」と注記 */
          bomData.push([lineName,lbl,sub,b.qty,(WH_MAP[whA]?WH_MAP[whA].n:whA)+' + '+(WH_MAP[whB]?WH_MAP[whB].n:whB),(b.reason||'')+releasedNote+' (倉庫分配未記録)']);
          return;
        }
        bomData.push([lineName,lbl,sub,b.qty,WH_MAP[lineWh]?WH_MAP[lineWh].n:lineWh,(b.reason||'')+releasedNote]);
      });
    });
    var wsBom=XLSX.utils.aoa_to_sheet(bomData);
    wsBom['!cols']=[{wch:14},{wch:36},{wch:10},{wch:10},{wch:14},{wch:24}];
    XLSX.utils.book_append_sheet(wb,wsBom,'部材一覧(BOM)');
  }
  XLSX.writeFile(wb,cfg.sheet+'_'+order.no+'.xlsx');
}

function App(){

  var userLoc=us(localStorage.getItem('lec_user_loc')||'honsha_office');
  var loggedIn=us(!!localStorage.getItem('lec_user_name'));
  var onlineUsers=us([]);
  var presenceStatus=us('connecting');/* connecting / connected / offline */
  var notif=us(null);
  var channelRef=ur(null);
  /* v14 D32: システム全体ロック - 先勝ち判定 */
  var isReadOnly=us(false);/* 後発ログインは true で読み取り専用 */
  var myPresenceKey=ur('');
  /* v14 D31: ユーザー管理モーダル（Codex P1対応: useStateはApp直下、IIFE内のurを排除） */
  var showUserMgmt=us(false);
  var bumpUsers=us(0);
  var newUserName_=us(''),newUserLoc_=us('honsha_office'),newUserRole_=us('user');

  var showToast=function(msg){toast[1](msg);setTimeout(function(){toast[1](null);},3000);};

  /* Setup Supabase Presence & Broadcast */
  ue(function(){
    if(!loggedIn[0]||!supaClient||!userName[0])return;
    /* Presence channel */
    var pKey=userName[0]+'_'+Date.now();
    myPresenceKey.current=pKey;
    var ch=supaClient.channel('lec-inventory-presence',{config:{presence:{key:pKey}}});
    ch.on('presence',{event:'sync'},function(){
      var state=ch.presenceState();
      var users=[];
      var allKeys=[];
      Object.keys(state).forEach(function(k){
        state[k].forEach(function(p){
          users.push({name:p.name,loc:p.loc,locLabel:p.locLabel,joinedAt:p.joinedAt||0,presenceKey:k});
          allKeys.push({key:k,joinedAt:p.joinedAt||0});
        });
      });

/* ========== MAIN PAGE: INVENTORY CHECK & QUOTE ========== */
function InvPage(p){
  var cust=p.selCust;
  var ln=us('jp01'),sz=us('M'),tp=us('standard'),cl=us('pb'),lk=us('dialH110');
  var doorType=us('door');
  var hasDoor=us(true);/* 扉の有無 (true=扉あり / false=扉なし) */
  var hasNameplate=us(false),hasNamePaper=us(false);
  var isl=us(9),tier=us(3);
  var extraJointScrew=us(0),extraCapScrew=us(0);/* 手動追加のジョイントネジ・目隠しネジ */
  var lines=us([]),whResults=us([]),selWH=us(null);
  var multiWH=us([]),selMulti=us(null);
  var showQuote=us(false),quoteOrder=us(null);
  var discount=us(0);
  var quoteSubject=us(''),paymentTerms=us('前払い（銀行振り込み）'),paymentCustom=us(''),quoteNotes=us(''),productNotes=us(['']);
  var quoteSalesPerson=us('');/* Override sales person per quote */
  var baseColor=us('gy'),hasBase=us(true),hasCap=us(true);
  var shelfQty=us(0),shelfColor=us('gy');
  var multiColor=us(false),colorBreak=us([]);
  /* v14 A3/A4: 目隠しネジは色別(ブラック/グレー)、サイドジョイントも手動入力 */
  var extraSideJoint=us(0);/* サイドジョイント手動追加 */
  var extraCapScrewGy=us(0);/* 目隠しネジ(グレー)手動追加 */
  /* v14 A6: パーツ単品追加用の製品ラインを独立管理（明細の本体ラインと異なる選択可能） */
  var partLine=us('jp01');
  /* Parts-only mode */
  var partType=us('side'),partSub=us('M'),partColor=us('pb'),partQty=us(1),partPrice=us(0);

  var colors=LINE_COLORS[ln[0]]||[];
  var sizes=LINE_SIZES[ln[0]]||[];
  var isJP=ln[0]==='jp01'||ln[0]==='jp2';
  function changeLine(v){ln[1](v);cl[1]((LINE_COLORS[v]||[])[0]?LINE_COLORS[v][0].v:'');var ss=LINE_SIZES[v]||[];sz[1](ss[0]||'S');}
  /* Fix: sync lock state when switching to personal type (#16) */
  ue(function(){
    if(tp[0]==='personal'&&lk[0]==='none')lk[1]('dialH110');
  },[tp[0]]);
  /* 扉なし時は自動で錠なし */
  ue(function(){
    if(!hasDoor[0])lk[1]('none');
    else if(lk[0]==='none'&&tp[0]==='personal')lk[1]('dialH110');
  },[hasDoor[0]]);
  /* 顧客変更時に明細・見積ドラフトをクリア */
  ue(function(){
    lines[1]([]);
    quoteOrder[1](null);
    showQuote[1](false);
    whResults[1]([]);
    multiWH[1]([]);
  },[p.selCust&&p.selCust.id]);
  var qty=(parseInt(isl[0])||1)*(parseInt(tier[0])||1);

  function addLine(){
    if(!cust)return;
    /* v14 Codex P2対応: 読み取り専用モードでは書き込み禁止 */
    if(p.isReadOnly){p.toast('読み取り専用モード中は編集できません');return;}
    var lock=!hasDoor[0]?'none':lk[0];
    if(tp[0]==='personal'&&lock==='none'&&hasDoor[0])lock='dialH110';
    var dt=isJP?doorType[0]:'door';
    var cb=null;
    if(multiColor[0]&&hasDoor[0]&&colorBreak[0].length>0){
      var total=colorBreak[0].reduce(function(s,x){return s+x.qty;},0);
      if(total!==qty){p.toast('色配分の合計('+total+')が台数('+qty+')と一致しません');return;}
      cb=colorBreak[0].filter(function(x){return x.qty>0;});
    }
    var lineObj={id:Date.now(),line:ln[0],size:sz[0],type:tp[0],noDoor:!hasDoor[0],color:!hasDoor[0]?'':(cb?cb[0].color:cl[0]),qty:qty,islands:parseInt(isl[0])||1,tiers:parseInt(tier[0])||1,lock:lock,doorType:dt,hasBase:hasBase[0],baseColor:isJP?baseColor[0]:'gy',hasCap:isJP?hasCap[0]:true,shelfQty:parseInt(shelfQty[0])||0,shelfColor:shelfColor[0],hasNameplate:hasNameplate[0],hasNamePaper:hasNamePaper[0],jointScrewQty:parseInt(extraJointScrew[0])||0,capScrewQty:parseInt(extraCapScrew[0])||0,capScrewGyQty:parseInt(extraCapScrewGy[0])||0,sideJointQty:parseInt(extraSideJoint[0])||0};
    if(cb&&cb.length>1)lineObj.colorBreakdown=cb;
    var nl=lines[0].concat([lineObj]);
    lines[1](nl);doCheck(nl);
  }
  function addPartLine(){
    if(!cust)return;
    var pd=PART_DEFS.find(function(d){return d.k===partType[0];});if(!pd)return;
    var pSub,pLabel=pd.l;
    if(pd.hasSub==='grp'){pSub=sizeObj(partSub[0]).grp;pLabel+='('+pSub.toUpperCase()+')';}
    else if(pd.hasSub==='size'){pSub=partSub[0];pLabel+='('+pSub+')';}
    /* v14 A6: パーツ単品の製品ラインは本体明細のラインとは別に partLine で選択可能 */
    var pLine=partLine[0]||ln[0];
    var pColorOpt=(LINE_COLORS[pLine]||LINE_COLORS[ln[0]]||[]);
    var pColor=pd.hasColor?(pColorOpt.find(function(c){return c.v===partColor[0];})?partColor[0]:(pColorOpt[0]&&pColorOpt[0].v)||''):'';
    var nl=lines[0].concat([{id:Date.now(),line:pLine,isPartOnly:true,partKey:pd.isDoor?pd.doorKey:pd.k,partSub:pSub,partColor:pd.hasColor?pColor:null,isDoor:!!pd.isDoor,qty:parseInt(partQty[0])||1,unitPrice:parseInt(partPrice[0])||0,partLabel:pLabel+'【'+(LINES.find(function(l){return l.id===pLine;})||{name:''}).name+'】',size:partSub[0],color:pd.hasColor?pColor:'',islands:0,tiers:0,lock:'none',type:'standard'}]);
    lines[1](nl);doCheck(nl);
  }
  /* Free input line (not in inventory) */
  var freeInputName=us(''),freeInputQty=us(1),freeInputUnit=us('個'),freeInputPrice=us(0),freeInputRemark=us('');
  function addFreeInputLine(){
    if(!freeInputName[0].trim()){p.toast('商品名称を入力してください');return;}
    var nl=lines[0].concat([{id:Date.now(),isFreeInput:true,name:freeInputName[0].trim(),qty:parseInt(freeInputQty[0])||1,unit:freeInputUnit[0]||'個',unitPrice:parseInt(freeInputPrice[0])||0,remark:freeInputRemark[0]||'',line:ln[0],isPartOnly:true,partLabel:freeInputName[0].trim(),partKey:'free',isDoor:false,size:'',color:'',islands:0,tiers:0,lock:'none',type:'standard'}]);
    lines[1](nl);
    freeInputName[1]('');freeInputQty[1](1);freeInputPrice[1](0);freeInputRemark[1]('');
  }
  function remLine(id){var nl=lines[0].filter(function(l){return l.id!==id;});lines[1](nl);nl.length?doCheck(nl):(whResults[1]([]),multiWH[1]([]));}

  function doCheck(ls){
    if(!ls||!ls.length){whResults[1]([]);multiWH[1]([]);return;}
    var results=[];
    WH_IDS.forEach(function(wId){
      var anyLine=ls.some(function(l){return hasStock(l.line,wId);});
      if(!anyLine){results.push({whId:wId,whName:WH_MAP[wId].n,check:{ok:false,items:[{label:'取扱製品なし',need:0,stock:0,held:0,free:0,ok:false,shortage:0}]},noLine:true});return;}
      var check=checkAllLinesWH(ls,wId);
      var ship=cust?calcShipping(ls,wId,cust.pref):null;
      results.push({whId:wId,whName:WH_MAP[wId].n,check:check,ship:ship});
    });
    /* Sort: OK first, then v01 priority (deplete old stock), then by shipping cost */
    var hasV01=ls.some(function(l){return l.line==='jp01';});
    results.sort(function(a,b){
      if(a.check.ok&&!b.check.ok)return -1;if(!a.check.ok&&b.check.ok)return 1;
      /* If order includes jp01 lines, prioritize warehouses that have jp01 stock */
      if(hasV01&&a.check.ok&&b.check.ok){
        var aHasV01=hasStock('jp01',a.whId);
        var bHasV01=hasStock('jp01',b.whId);
        if(aHasV01&&!bHasV01)return -1;if(!aHasV01&&bHasV01)return 1;
      }
      if(a.ship&&b.ship)return a.ship.shipping-b.ship.shipping;
      return 0;
    });
    whResults[1](results);
    var best=results.find(function(r){return r.check.ok&&!r.noLine;});
    selWH[1](best?best.whId:null);
    selMulti[1](null);
    /* If no single warehouse can fulfill, try pairs */
    var okResults=results.filter(function(r){return r.check.ok&&!r.noLine;});
    if(okResults.length===0){
      var multiOpts=[];
      /* Build aggregated BOM per product line for combined checking */
      var bomByLine={};
      ls.forEach(function(ln){
        if(ln.isFreeInput)return;/* Free input lines have no inventory to check */
        if(!bomByLine[ln.line])bomByLine[ln.line]=[];
        var bom;
        if(ln.isPartOnly){
          bom=[];
          if(ln.isDoor){bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}
          else if(ln.partSub!==undefined){bom.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}
          else{bom.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}
        }else{bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);}
        bom.forEach(function(b){
          bomByLine[ln.line].push({b:b,color:ln.color,size:ln.size,orderCol:isOrderColor(ln.line,ln.color)});
        });
      });
      /* Aggregate BOM by product line, similar to checkAllLinesWH */
      var aggBOM=[];/* Array of {lineId, key, sub, color, size, doorKey, isDoor, isOrder, qty, label} */
      Object.keys(bomByLine).forEach(function(lineId){
        var structAgg={},doorAgg={},simpleAgg={};
        bomByLine[lineId].forEach(function(item){
          var b=item.b;
          if(b.isDoor){
            if(item.orderCol){return;/* Skip order colors */}
            var dKey=b.key+'|'+item.color+'|'+item.size;
            if(!doorAgg[dKey])doorAgg[dKey]={qty:0,label:b.label,doorKey:b.key,color:item.color,size:item.size};
            doorAgg[dKey].qty+=b.qty;
          }else if(b.sub!==undefined){
            var sKey=b.key+'|'+b.sub;
            if(!structAgg[sKey])structAgg[sKey]={qty:0,label:b.label,key:b.key,sub:b.sub};
            structAgg[sKey].qty+=b.qty;
          }else{
            if(!simpleAgg[b.key])simpleAgg[b.key]={qty:0,label:b.label,key:b.key};
            simpleAgg[b.key].qty+=b.qty;
          }
        });
        Object.keys(structAgg).forEach(function(k){var a=structAgg[k];aggBOM.push({lineId:lineId,key:a.key,sub:a.sub,isDoor:false,qty:a.qty,label:a.label});});
        Object.keys(doorAgg).forEach(function(k){var a=doorAgg[k];aggBOM.push({lineId:lineId,doorKey:a.doorKey,color:a.color,size:a.size,isDoor:true,qty:a.qty,label:a.label});});
        Object.keys(simpleAgg).forEach(function(k){var a=simpleAgg[k];aggBOM.push({lineId:lineId,key:a.key,isDoor:false,qty:a.qty,label:a.label});});
      });
      /* Try all pairs of warehouses */
      for(var i=0;i<WH_IDS.length;i++){
        for(var j=i+1;j<WH_IDS.length;j++){
          var wA=WH_IDS[i],wB=WH_IDS[j];
          var pairOk=true;
          var pairItems=[];
          aggBOM.forEach(function(ab){
            var stockA=0,heldA=0,stockB=0,heldB=0;
            if(ab.isDoor){
              if(hasStock(ab.lineId,wA)){stockA=gd(ab.lineId,wA,ab.color,ab.size,ab.doorKey);heldA=ghd(ab.lineId,wA,ab.color,ab.size,ab.doorKey);}
              if(hasStock(ab.lineId,wB)){stockB=gd(ab.lineId,wB,ab.color,ab.size,ab.doorKey);heldB=ghd(ab.lineId,wB,ab.color,ab.size,ab.doorKey);}
            }else if(ab.sub!==undefined){
              if(hasStock(ab.lineId,wA)){stockA=gs(ab.lineId,wA,ab.key,ab.sub);heldA=gh(ab.lineId,wA,ab.key,ab.sub);}
              if(hasStock(ab.lineId,wB)){stockB=gs(ab.lineId,wB,ab.key,ab.sub);heldB=gh(ab.lineId,wB,ab.key,ab.sub);}
            }else{
              if(hasStock(ab.lineId,wA)){stockA=gs(ab.lineId,wA,ab.key);heldA=gh(ab.lineId,wA,ab.key);}
              if(hasStock(ab.lineId,wB)){stockB=gs(ab.lineId,wB,ab.key);heldB=gh(ab.lineId,wB,ab.key);}
            }
            var freeA=stockA-heldA,freeB=stockB-heldB;
            var combined=freeA+freeB;
            var pass=combined>=ab.qty;
            if(!pass)pairOk=false;
            pairItems.push({label:ab.label,need:ab.qty,stockA:stockA,stockB:stockB,freeA:freeA,freeB:freeB,combined:combined,ok:pass,shortage:Math.max(0,ab.qty-combined)});
          });
          if(pairOk){
            var shipA=cust?calcShipping(ls,wA,cust.pref):null;
            var shipB=cust?calcShipping(ls,wB,cust.pref):null;
            var combinedShip=(shipA?shipA.shipping:0)+(shipB?shipB.shipping:0);
            multiOpts.push({whA:wA,whB:wB,nameA:WH_MAP[wA].n,nameB:WH_MAP[wB].n,items:pairItems,shipA:shipA,shipB:shipB,combinedShip:combinedShip});
          }
        }
      }
      /* Sort by combined shipping cost */
      multiOpts.sort(function(a,b){return a.combinedShip-b.combinedShip;});
      multiWH[1](multiOpts);
    }else{
      multiWH[1]([]);
    }
  }

  function getBOM(ln){
    if(ln.isFreeInput)return[];/* Free input lines have no BOM */
    if(ln.isPartOnly){var b=[];if(ln.isDoor){b.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel,isDoor:true,doorSub:ln.partSub});}else if(ln.partSub!==undefined){b.push({key:ln.partKey,sub:ln.partSub,qty:ln.qty,label:ln.partLabel});}else{b.push({key:ln.partKey,qty:ln.qty,label:ln.partLabel});}return b;}
    return calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);
  }
  function doHoldAndQuote(){
    if(!lines[0].length||!selWH[0])return;
    /* v14 Codex P2対応: 読み取り専用モードでは禁止 */
    if(p.isReadOnly){p.toast('読み取り専用モード中は仮押さえできません');return;}
    /* 重複仮押さえ防止: 既に同じ顧客の仮押さえドラフトがある場合は警告 */
    var existing=quoteOrder[0];
    if(existing&&existing.status==='仮押さえ'&&existing.cid===cust.id){
      if(!confirm('既に仮押さえ済の案件「'+existing.no+'」があります。\nさらに仮押さえすると在庫が追加で消費されます。\n本当に続けますか？')){
        p.toast('中止しました。既存の仮押さえを解除したい場合は案件管理から操作してください');
        return;
      }
    }
    var wh=selWH[0];
    /* v14 A8: 在庫不足でも仮押さえ可能。不足分は未確保フラグを付けて発注待ちに流す */
    var fullCheck=checkAllLinesWH(lines[0],wh);
    var shortageItems=fullCheck.items.filter(function(it){return !it.ok&&!it.orderItem;});
    if(shortageItems.length>0){
      var shortageMsg='以下のパーツが在庫不足です（未確保として発注待ちに登録します）:\n'+shortageItems.slice(0,5).map(function(it){return '・'+it.label+' 不足:'+it.shortage;}).join('\n');
      if(shortageItems.length>5)shortageMsg+='\n…他'+(shortageItems.length-5)+'件';
      shortageMsg+='\n\n仮押さえを続行しますか？';
      if(!confirm(shortageMsg))return;
    }
    /* 在庫がある分のみ HELD に積む。不足分は未確保リストに残す。
       v14 Codex P1対応: lines をディープコピーしてから _actualHeld 等を付与（同じlinesから別orderを作る場合の干渉を防ぐ） */
    var clonedLines=lines[0].map(function(ln){return Object.assign({},ln);});
    var unsecuredParts=[];
    clonedLines.forEach(function(ln){
      var bom=getBOM(ln);
      var actual=holdBOMPartial(ln.line,wh,bom,ln.color,ln.size,ln.colorBreakdown,unsecuredParts);
      ln._actualHeld=actual;ln._heldWh=wh;ln._hadActualHeld=true;
    });
    var shipInfo=cust?calcShipping(clonedLines,wh,cust.pref):null;
    var no='QT-2026-'+String(nextON++).padStart(3,'0');
    var pt=paymentTerms[0]==='その他'?paymentCustom[0]:paymentTerms[0];
    var order={no:no,cid:cust.id,wh:wh,status:'仮押さえ',date:td2(),lines:clonedLines,shipping:shipInfo?shipInfo.shipping:0,discount:parseInt(discount[0])||0,subject:quoteSubject[0]||'',paymentTerms:pt,notes:quoteNotes[0]||'',productNotes:(Array.isArray(productNotes[0])?productNotes[0].filter(function(x){return x.trim();}).join('\n'):productNotes[0])||'',salesPersonOverride:quoteSalesPerson[0]||'',unsecuredParts:unsecuredParts};
    ORDERS.push(order);
    quoteOrder[1](order);showQuote[1](true);
    p.toast('仮押さえ＆見積作成完了: '+no+(unsecuredParts.length?'（未確保'+unsecuredParts.length+'件）':''));
    /* v14 D30: 他セッションへ通知 */
    broadcastOrderUpdate(p.userName||'',no+' 仮押さえ作成');
    /* whResults保持改善: 倉庫比較UIが消えないよう doCheck で再計算 */
    doCheck(lines[0]);
    p.bump();saveAll();
  }

  function doHoldAndQuoteMulti(){
    if(!lines[0].length||selMulti[0]===null||!multiWH[0][selMulti[0]])return;
    /* v14 Codex P2対応: 読み取り専用モードでは禁止 */
    if(p.isReadOnly){p.toast('読み取り専用モード中は仮押さえできません');return;}
    var mo=multiWH[0][selMulti[0]];
    var whA=mo.whA,whB=mo.whB;
    /* v14.2 Codex P2対応: 各ラインの _actualHeld(倉庫情報入り) を保存して、出荷BOM Excel で正しく分配 */
    var clonedLinesM=lines[0].map(function(ln){return Object.assign({},ln);});
    clonedLinesM.forEach(function(ln){
      var bom=getBOM(ln);
      var actualM=holdBOMMulti(ln.line,whA,whB,bom,ln.color,ln.size,ln.colorBreakdown);
      ln._actualHeld=actualM;ln._heldWh=whA;ln._hadActualHeld=true;/* 主倉庫を _heldWh としてマーク。詳細分配は _actualHeld._wh で判断 */
    });
    var shipA=cust?calcShipping(lines[0],whA,cust.pref):null;
    var shipB=cust?calcShipping(lines[0],whB,cust.pref):null;
    var totalShip=(shipA?shipA.shipping:0)+(shipB?shipB.shipping:0);

/* ========== QUOTE PREVIEW (4 doc types with tabs) ========== */
function QuotePreview(p){
  var o=p.order;
  var docType=us(p.docType||'quote');
  var dt=docType[0];
  var cust=CUSTS.find(function(c){return c.id===o.cid;});
  var DOC_CFG={
    quote:{title:'御見積書',subtitle:'下記のとおり御見積申し上げます。',amountLabel:'見積金額',dateLabel:'見積日'},
    invoice:{title:'請求書',subtitle:'毎度ありがとうございます。下記のとおりご請求申し上げます。',amountLabel:'請求金額',dateLabel:'請求日'},
    delivery:{title:'納品書',subtitle:'下記のとおり納品致しましたのでご査収ください。',amountLabel:'納品金額',dateLabel:'納品日'},
    receipt:{title:'物品受領書',subtitle:'下記のとおり受領致しました。',amountLabel:'',dateLabel:'納品日'},
    shipping:{title:'出荷指示書',subtitle:'以下の製品の出荷を指示します。',amountLabel:'',dateLabel:'出荷指示日'}
  };
  var cfg=DOC_CFG[dt]||DOC_CFG.quote;
  var isReceipt=dt==='receipt';
  var isShipping=dt==='shipping';
  var rows=[],rowNo=1,subtotal=0;
  o.lines.forEach(function(ln){
    if(ln.isPartOnly){
      var amt=ln.qty*(ln.unitPrice||0);subtotal+=amt;
      var pName3=ln.isFreeInput?ln.name:(productName(ln.line)+' '+ln.partLabel);
      var pUnit3=ln.isFreeInput?(ln.unit||'個'):'個';
      var pRmk3=ln.isFreeInput?(ln.remark||''):'';
      rows.push({no:rowNo++,code:'',name:pName3,qty:ln.qty,unit:pUnit3,price:ln.unitPrice||0,amount:amt,tax:amt>0?'10%(外)':'',remark:pRmk3});
      return;
    }
    var sz=sizeObj(ln.size);var co=(LINE_COLORS[ln.line]||[]).find(function(c){return c.v===ln.color;});
    var colorName=(ln.type==='open'||!co)?'':co.l;var isPersonal=ln.type==='personal';
    var pn=productName(ln.line);
    var colorDesc2=colorName?' '+colorName+'色':'';
    if(ln.colorBreakdown&&ln.colorBreakdown.length>0){
      colorDesc2=' '+ln.colorBreakdown.map(function(cb){if(cb.color==='open')return 'オープン×'+cb.qty;var cn=(LINE_COLORS[ln.line]||[]).find(function(cc){return cc.v===cb.color;});return (cn?cn.l:'')+'×'+cb.qty;}).join('/');
    }
    var itemName=pn+' '+sz.l+colorDesc2;
    var lockObj2=LOCK_TYPES.find(function(lt){return lt.v===ln.lock;});
    if(lockObj2&&ln.lock!=='none')itemName+='　'+(lockObj2.s||lockObj2.l);
    if(isPersonal&&(!lockObj2||ln.lock==='none'))itemName+='・トッテ';
    var sq=parseInt(ln.shelfQty)||0;
    if(sq>0){var sc2=SHELF_COLORS.find(function(x){return x.v===ln.shelfColor;})||{l:'グレー'};itemName+='・棚板（'+sc2.l+'）';}
    if(ln.type==='open')itemName+='（オープン）';
    var amt2=ln.qty*sz.p;
    if(sq>0)amt2+=sq*SHELF_PRICE;
    subtotal+=amt2;
    var dimNote2=sz.dim?'外寸:'+sz.dim:'';
    rows.push({no:rowNo++,code:sz.code,name:itemName,qty:ln.qty,unit:'台',price:sz.p,amount:amt2,tax:'10%(外)',configNote:'【'+ln.islands+'列'+ln.tiers+'段】'+(sq>0?' 棚板'+sq+'枚含':''),remark:dimNote2});
  });
  var baseLines=o.lines.filter(function(l){return !l.isPartOnly&&l.hasBase!==false;});
  /* v14.3: ベースはパーソナルでn(1台×1枚)、常設はislands。上下共通ボードはtop側でn*2化 */
  var ti=baseLines.reduce(function(s,l){return s+(l.type==='personal'?l.islands*l.tiers:l.islands);},0);
  if(ti>0){
    var fl0=baseLines[0]||{};var bColor=fl0.baseColor||'gy';var bCap=fl0.hasCap!==false;
    var bColorName=bColor==='bk'?'ブラック':'グレー';
    var bName=productName(fl0.line||'jp01')+'ベースボード('+bColorName+')'+(bCap?' アンカー穴キャップ付':'');
    var bt=ti*4000;subtotal+=bt;
    rows.push({no:rowNo++,code:'MYPL-B',name:bName,qty:ti,unit:'枚',price:4000,amount:bt,tax:'10%(外)'});
  }
  var ship=o.shipping||0;
  if(ship>0){subtotal+=ship;rows.push({no:rowNo++,code:'F00063',name:'送料(混載便・時間指定不可)',qty:1,unit:'式',price:ship,amount:ship,tax:'10%(外)'});}
  var disc=o.discount||0;
  if(disc>0){subtotal-=disc;rows.push({no:rowNo++,code:'F00064',name:'出精値引き',qty:1,unit:'式',price:'',amount:-disc,tax:''});}
  var tax10=Math.floor(subtotal*0.1),total=subtotal+tax10;
  var hasNonPart=o.lines.some(function(l){return!l.isPartOnly;});
  var subject=o.subject||'';

    if((ns==='出荷指示'||ns==='出荷完了')&&order.unsecuredParts&&order.unsecuredParts.length>0){

/* Compute per-part quantities for an order (for held/shipped grids) */
function computeOrderParts(order){
  var parts={};
  order.lines.forEach(function(ln){
    if(ln.isFreeInput)return;
    if(ln.isPartOnly){
      var pk;
      if(ln.isDoor){pk=ln.partKey+':'+ln.color+':'+ln.partSub;}
      else if(ln.partSub!==undefined){pk=ln.partKey+':'+ln.partSub;}
      else{pk=ln.partKey;}
      parts[pk]=(parts[pk]||0)+ln.qty;
      return;
    }
    var bom=calcBOM(ln.size,ln.islands,ln.tiers,ln.lock,ln.type,ln);
    bom.forEach(function(b){
      if(b.isDoor){
        var colors2=ln.colorBreakdown&&ln.colorBreakdown.length>0?ln.colorBreakdown:[{color:ln.color,qty:b.qty}];
        colors2.forEach(function(dc){
          var pk=b.key+':'+dc.color+':'+b.doorSub;
          parts[pk]=(parts[pk]||0)+dc.qty;
        });
      }else if(b.sub!==undefined){
        var pk=b.key+':'+b.sub;
        parts[pk]=(parts[pk]||0)+b.qty;
      }else{
        parts[b.key]=(parts[b.key]||0)+b.qty;
      }
    });
  });
  /* v14.2 Codex P2対応: 部分解放を差し引く（押さえ数の正確な現値を返す） */
  if(order._partialReleases&&order._partialReleases.length){
    order._partialReleases.forEach(function(r){
      var pk;
      if(r.isDoor)pk=r.key+':'+(r.color||'')+':'+(r.doorSub||'');
      else if(r.sub)pk=r.key+':'+r.sub;
      else pk=r.key;
      parts[pk]=Math.max(0,(parts[pk]||0)-r.released);
    });
  }
  return parts;
}
/* Get part key for a uniRow to look up in computeOrderParts result */
function uniRowPartKey(r){
  if(r.isDoor)return r.dk+':'+r.color+':'+r.doorSub;
  if(r.sub!==undefined)return r.key+':'+r.sub;
  return r.key;
}

                  if(isCommonStockKey(row.key)&&lnObj.id!=='jp2')return;
                  var stks=lWhs.map(function(w){return row.sub!==undefined?hgs(lnObj.id,w,row.key,row.sub):hgs(lnObj.id,w,row.key);});
                  var tot=stks.reduce(function(a,b){return a+b;},0);
                  if(tot>0)data.push([row.label,row.sub||''].concat(stks).concat([tot]));
                });
                /* 扉も追加 */
                var dColors=LINE_COLORS[lnObj.id]||[];
                var dSizes=LINE_SIZES[lnObj.id]||[];
                ['door','doorH'].forEach(function(dk){
                  dColors.forEach(function(c){
                    dSizes.forEach(function(sz3){
                      if(sz3==='SSA')return;
                      var stks=lWhs.map(function(w){return hgd(lnObj.id,w,c.v,sz3,dk);});
                      var tot=stks.reduce(function(a,b){return a+b;},0);
                      if(tot>0)data.push([(dk==='doorH'?'扉〈ホタ〉':'扉')+' '+c.l,sz3].concat(stks).concat([tot]));
                    });
                  });
                });
                XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),lnObj.name);
              });
              XLSX.writeFile(wb,'在庫表スナップショット_'+sf.date+'.xlsx');
              p.toast('在庫表スナップショット出力完了: '+sf.date+'時点 ('+reverseLogs.length+'件遡及)');
            }else if(sf.type==='asset'){
              /* 在庫資産スナップショット */
              var grand=0;
              var sumData=[['【在庫資産スナップショット】 基準日: '+sf.date],[],['製品ライン','合計金額']];
              LINES.forEach(function(lnObj){
                var lWhs=WH_IDS.filter(function(w){return hasStock(lnObj.id,w);});
                var data=[['【'+lnObj.name+' 在庫資産】 基準日: '+sf.date],[],['部材','数量','単価','金額']];
                var lineTotal=0;
                structRowsAll.forEach(function(row){
                  if(isCommonStockKey(row.key)&&lnObj.id!=='jp2')return;
                  var tq=0;lWhs.forEach(function(w){tq+=row.sub!==undefined?hgs(lnObj.id,w,row.key,row.sub):hgs(lnObj.id,w,row.key);});
                  var cost=row.sub!==undefined?(UNIT_COST[row.key]&&UNIT_COST[row.key][row.sub]||0):(typeof UNIT_COST[row.key]==='number'?UNIT_COST[row.key]:0);
                  var val=tq*cost;lineTotal+=val;
                  if(tq>0)data.push([row.label,tq,cost,val]);
                });
                /* v14.2 Codex P3対応: カスタム部材は structRowsAll に既にマージ済みのため再追加しない */
                /* 扉資産 */
                var dColors=LINE_COLORS[lnObj.id]||[];
                var dSizes=LINE_SIZES[lnObj.id]||[];
                ['door','doorH'].forEach(function(dk){
                  dColors.forEach(function(c){
                    dSizes.forEach(function(sz3){
                      if(sz3==='SSA')return;
                      var tq=0;lWhs.forEach(function(w){tq+=hgd(lnObj.id,w,c.v,sz3,dk);});
                      if(tq>0){
                        var cost=(UNIT_COST[dk]&&UNIT_COST[dk][sz3])||0;
                        var val=tq*cost;lineTotal+=val;
                        data.push([(dk==='doorH'?'扉ホタ':'扉')+' '+c.l+' '+sz3,tq,cost,val]);
                      }
                    });
                  });
                });
                data.push([],['合計','','',lineTotal]);
                XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),lnObj.name);
                sumData.push([lnObj.name,lineTotal]);
                grand+=lineTotal;
              });
              sumData.push(['総合計',grand]);
              XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumData),'サマリー');
              XLSX.writeFile(wb,'在庫資産スナップショット_'+sf.date+'.xlsx');
              p.toast('在庫資産スナップショット出力完了: '+sf.date+'時点 (¥'+fm(grand)+')');
            }
            showSnapshotExcel[1](false);
          }catch(ex){p.toast('Excel出力に失敗: '+ex.message);}
        }},'📥 Excel出力')
      )},
      h('div',null,
        h('p',{style:{fontSize:11,color:'var(--g500)',marginBottom:10,lineHeight:1.7}},
          '指定した日付時点での在庫データ（在庫表または在庫資産）をパーツごとに出力します。',
          h('br'),
          h('b',null,'計算方法: '),'現在のSTKから、指定日以降のEDIT_LOG差分を逆方向に巻き戻して再構築します。',
          h('br'),
          h('b',{style:{color:'#DC2626'}},'※注意: '),'EDIT_LOG に記録された変更のみが反映されます。記録外の変更（直接的なSTK改変等）は再現できません。'
        ),
        h('div',{style:{display:'flex',gap:8,marginBottom:10}},
          h('div',{style:{flex:1}},
            h('label',{style:{fontSize:10,fontWeight:600,color:'var(--g500)'}},'基準日（この日時点の在庫を出力）'),
            h('input',{className:'inp',type:'date',value:snapshotForm[0].date,onChange:function(e){var f=Object.assign({},snapshotForm[0]);f.date=e.target.value;snapshotForm[1](f);}})
          ),
          h('div',{style:{flex:1}},
            h('label',{style:{fontSize:10,fontWeight:600,color:'var(--g500)'}},'出力種別'),
            h('select',{className:'inp',value:snapshotForm[0].type,onChange:function(e){var f=Object.assign({},snapshotForm[0]);f.type=e.target.value;snapshotForm[1](f);}},
              h('option',{value:'stock'},'在庫表（パーツ別数量）'),
              h('option',{value:'asset'},'在庫資産（パーツ別金額）')
            )
          )
        ),
        h('div',{style:{display:'flex',gap:4,marginBottom:10}},
          [{l:'今日',d:0},{l:'1週間前',d:7},{l:'1ヶ月前',d:30},{l:'3ヶ月前',d:90},{l:'半年前',d:180}].map(function(pr){
            return h('button',{key:pr.l,className:'btn btn-xs btn-ol',onClick:function(){
              var tdy=new Date();var prev=new Date(tdy.getTime()-pr.d*86400000);
              var fmt=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
              var f=Object.assign({},snapshotForm[0]);f.date=fmt(prev);snapshotForm[1](f);
            }},pr.l);
          })
        )
      )
    ):null
  );
}

/* ========== RENDER ========== */
ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
